};
const DAY_PX=12,ROW_H=36,LABEL_W=220;

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function parseDate(s){if(!s)return null;const d=new Date(s+"T00:00:00");return isNaN(d.getTime())?null:d;}
function fmtDate(d){if(!d)return "";return d.toISOString().split("T")[0];}
// Sanitise any date value to YYYY-MM-DD string (or "").
// Handles: already-correct strings, Date objects, full JS date strings.
function safeDate(v){
  if(!v)return "";
  if(typeof v==="string"){
    // Already YYYY-MM-DD
    if(/^\d{4}-\d{2}-\d{2}$/.test(v.trim()))return v.trim();
    // Try parsing as a date string (covers "Tue Mar 17 2026 00:00:00 GMT...")
    const d=new Date(v);
    if(!isNaN(d.getTime()))return fmtDate(d);
    return "";
  }
  if(v instanceof Date&&!isNaN(v.getTime()))return fmtDate(v);
  return "";
}
function fmtDisplay(d){if(!d)return "";return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function fmtShort(d){if(!d)return "";return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function fmtTime(d){if(!d)return "";return d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
// Collision-resistant unique ID: prefix + random base36 + timestamp base36
function uid(prefix){
  return (prefix||"id")+"_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36);
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffDays(a,b){return Math.round((b.getTime()-a.getTime())/86400000);}
function getMondaysInRange(start,end){const mon=[];let d=new Date(start);const dow=d.getDay();if(dow!==1)d.setDate(d.getDate()+(dow===0?1:8-dow));while(d<=end){mon.push(new Date(d));d=addDays(d,7);}return mon;}
function getNextThursday(from){const d=new Date(from);const diff=(4-d.getDay()+7)%7||7;d.setDate(d.getDate()+diff);return d;}
function getLastThursday(from){const d=new Date(from);const dow=d.getDay();d.setDate(d.getDate()-(dow>=4?dow-4:dow+3));return d;}
function taskProgress(t){if(!t.checklist||!t.checklist.length)return null;return Math.round(t.checklist.filter(c=>c.done).length/t.checklist.length*100);}
function isActive(t){return ACTIVE_STATUSES.includes(t.status);}

// ── GOOGLE SHEETS CLIENT v2 — tabular, row-level sync ────────────────────────
// Each sheet tab now stores data as a proper table:
//   Row 1: column headers   (human-readable)
//   Row 2+: one record per row
//
// Actions:
//   ping             — health-check
//   readSheet        — returns {headers, rows} for a named sheet
//   upsertRow        — insert or update a single row matched by idField
//   deleteRow        — delete a row matched by idField + idValue
//   writeConfig      — write a small JSON blob for config sheets (workstreams, statuses, members, epics)
//   readConfig       — read back that config blob
//   writeAuditRow    — append a row to the audit log (never updates)

function createSheetsClient(scriptUrl){
  const url=scriptUrl.replace(/\/+$/,"");
  async function req(payload){
    const r=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error("HTTP "+r.status);
    const _ct=r.headers.get("content-type")||"";
    if(!_ct.includes("json")&&!_ct.includes("text/plain")) throw new Error("Apps Script returned an HTML page instead of JSON. Check the deployment URL and ensure Execute as: Me, Access: Anyone.");
    const json=await r.json();
    if(json.error)throw new Error(json.error);
    return json;
  }

  // ── Schema definitions ─────────────────────────────────────────────────────
  // Tasks — each field maps to a column header in the Sheet
  const TASK_COLS=["id","name","workstream","epic","assignee","status","priority","start","deadline","notes","checklist","lastReviewed","lastModified","modifiedBy","completionDate","archiveCompleteDate","meetingNotes"];
  const TASK_HEADERS=["ID","Task Name","Workstream","Epic","Assignee","Status","Priority","Start Date","Deadline","Notes","Checklist (JSON)","Last Reviewed","Last Modified","Modified By","Completion Date","Archive Date","Meeting Notes (JSON)"];

  const DECISION_COLS=["id","text","madeBy","workstream","epic","notes","date","attendees","lastModified","meetingDate","meetingLabel"];
  const DECISION_HEADERS=["ID","Decision","Made By","Workstream","Epic","Notes / Rationale","Date","Attendees","Last Modified","Meeting Date","Meeting Label"];

  const AUDIT_COLS=["id","type","description","date","time","meetingAttendees"];
  const AUDIT_HEADERS=["ID","Type","Description","Date","Time","Meeting Attendees"];

  // ── Shared constants ────────────────────────────────────────────────────────
  const DATE_FIELDS=["start","deadline","lastReviewed","completionDate","archiveCompleteDate"];

  // ── Serialise / deserialise tasks ─────────────────────────────────────────
  function taskToRow(t){
    return TASK_COLS.map(k=>{
      if(k==="checklist") return t.checklist&&t.checklist.length?JSON.stringify(t.checklist):"";
      if(k==="meetingNotes") return t.meetingNotes&&t.meetingNotes.length?JSON.stringify(t.meetingNotes):"";
      if(DATE_FIELDS.includes(k)) return safeDate(t[k]);
      return t[k]!==undefined&&t[k]!==null?String(t[k]):"";
    });
  }
  function rowToTask(headers,row){
    const obj={};
    TASK_COLS.forEach((k,i)=>{
      const v=row[i]||"";
      if(k==="id") obj[k]=isNaN(Number(v))?v:Number(v);
      else if(k==="checklist"){
        try{ obj[k]=v?JSON.parse(v):[]; }catch{ obj[k]=[]; }
      }
      else if(k==="meetingNotes"){
        try{ obj[k]=v?JSON.parse(v):[]; }catch{ obj[k]=[]; }
      }
      else if(DATE_FIELDS.includes(k)) obj[k]=safeDate(v);
      else obj[k]=v;
    });
    return obj;
  }
  function decisionToRow(d){
    return DECISION_COLS.map(k=>{
      if(k==="attendees") return d.attendees&&d.attendees.length?d.attendees.join(", "):"";
      return d[k]!==undefined&&d[k]!==null?String(d[k]):"";
    });
  }
  function rowToDecision(headers,row){
    const obj={};
    DECISION_COLS.forEach((k,i)=>{
      const v=row[i]||"";
      if(k==="id") obj[k]=isNaN(Number(v))?v:Number(v);
      else if(k==="attendees") obj[k]=v?v.split(",").map(s=>s.trim()).filter(Boolean):[];
      else obj[k]=v;
    });
    return obj;
  }
  function auditToRow(e){
    return AUDIT_COLS.map(k=>{
      if(k==="meetingAttendees") return e.meetingAttendees&&e.meetingAttendees.length?e.meetingAttendees.join(", "):"";
      return e[k]!==undefined&&e[k]!==null?String(e[k]):"";
    });
  }

  // ── Low-level primitives ───────────────────────────────────────────────────
  function ping(){ return req({action:"ping"}); }

  async function initSheet(sheet,headers){
    // Ensure the sheet exists with the right headers
    return req({action:"initSheet",sheet,headers});
  }

  async function readAllRows(sheet){
    // Returns {headers:[], rows:[[],...]}
    return req({action:"readSheet",sheet});
  }

  async function upsertRow(sheet,idCol,idValue,rowData,lastModified){
    // rowData is a flat array aligned with the sheet columns
    const payload={action:"upsertRow",sheet,idCol,idValue:String(idValue),rowData};
    if(lastModified) payload.lastModified=lastModified;
    return req(payload);
  }

  async function deleteRow(sheet,idCol,idValue){
    return req({action:"deleteRow",sheet,idCol,idValue:String(idValue)});
  }

  async function appendRow(sheet,rowData){
    return req({action:"appendRow",sheet,rowData});
  }

  async function writeConfig(sheet,data){
    // Writes small config (workstreams, members, etc.) as a single JSON cell
    // with a friendly label in col A
    return req({action:"writeConfig",sheet,data:JSON.stringify(data)});
  }

  async function readConfig(sheet){
    const r=await req({action:"readConfig",sheet});
    if(r&&r.data){
      try{ return JSON.parse(r.data); }
      catch(e){ console.warn("Config parse failed for "+sheet+":",e); return null; }
    }
    return null;
  }

  // ── High-level API used by the App ─────────────────────────────────────────
  return{
    ping,

    // ── Initial setup: create all sheet tabs with headers ──
    async setupSheets(){
      await Promise.all([
        initSheet("Tasks",TASK_HEADERS),
        initSheet("Decisions",DECISION_HEADERS),
        initSheet("Audit Log",AUDIT_HEADERS),
        initSheet("Config - Workstreams",""),
        initSheet("Config - Statuses",""),
        initSheet("Config - Members",""),
        initSheet("Config - Epics",""),
        initSheet("Emoji Log",["ID","Week","Member","Emoji","Date"]),
        initSheet("Config - Agenda",""),
        initSheet("Config - WorkstreamHealth",""),
      ]);
    },

    // ── Tasks ──────────────────────────────────────────────────────────────
    async loadTasks(){
      const res=await readAllRows("Tasks");
      if(!res||!res.rows||!res.rows.length) return null;
      return res.rows.map(r=>rowToTask(res.headers,r));
    },

    async upsertTask(task){
      const res=await upsertRow("Tasks","ID",task.id,taskToRow(task),task.lastModified||"");
      if(res&&res.error&&res.error.startsWith("CONFLICT:")){
        throw new Error("CONFLICT:"+task.id+":"+res.error.slice(9));
      }
    },

    async deleteTask(taskId){
      await deleteRow("Tasks","ID",taskId);
    },

    async bulkWriteTasks(tasks,lockedBy){
      return req({action:"bulkWrite",sheet:"Tasks",headers:TASK_HEADERS,rows:tasks.map(taskToRow),lockedBy:lockedBy||"unknown"});
    },

    // ── Decisions ─────────────────────────────────────────────────────────
    async loadDecisions(){
      const res=await readAllRows("Decisions");
      if(!res||!res.rows||!res.rows.length) return null;
      return res.rows.map(r=>rowToDecision(res.headers,r));
    },

    async upsertDecision(decision){
      await upsertRow("Decisions","ID",decision.id,decisionToRow(decision));
    },

    async bulkWriteDecisions(decisions,lockedBy){
      return req({action:"bulkWrite",sheet:"Decisions",headers:DECISION_HEADERS,rows:decisions.map(decisionToRow),lockedBy:lockedBy||"unknown"});
    },

    // ── Audit Log — append only ────────────────────────────────────────────
    async appendAudit(entry){
      await appendRow("Audit Log",auditToRow(entry));
    },

    async loadAuditLog(){
      const res=await readAllRows("Audit Log");
      if(!res||!res.rows||!res.rows.length) return null;
      return res.rows.map(r=>{
        const obj={};
        AUDIT_COLS.forEach((k,i)=>{
          const v=r[i]||"";
          if(k==="id") obj[k]=isNaN(Number(v))?v:Number(v);
          else if(k==="meetingAttendees") obj[k]=v?v.split(",").map(s=>s.trim()).filter(Boolean):[];
          else obj[k]=v;
        });
        return obj;
      });
    },

    // ── Contacts ──────────────────────────────────────────────────────────────
    async loadContacts(){
      const CONTACT_COLS=["id","name","company","jobRole","type","stage","email","linkedin","phone","poc","assignee","introducedBy","source","channel","warmth","lastTouchDate","nextActionDate","nextAction","checkSize","thesisFit","notes","tags","log","lastModified","modifiedBy"];
      const res=await readAllRows("Contacts");
      if(!res||!res.rows||!res.rows.length) return null;
      return res.rows.map(r=>{
        const obj={};
        CONTACT_COLS.forEach((k,i)=>{
          const v=r[i]||"";
          if(k==="id") obj[k]=isNaN(Number(v))?v:Number(v);
          else if(k==="log"){ try{ obj[k]=v?JSON.parse(v):[]; }catch{ obj[k]=[]; } }
          else if(k==="tags") obj[k]=v?v.split(",").map(s=>s.trim()).filter(Boolean):[];
          else if(k==="lastTouchDate"||k==="nextActionDate") obj[k]=safeDate(v);
          else obj[k]=v;
        });
        return obj;
      });
    },
    async upsertContact(c){

      if(res&&res.error&&res.error.startsWith("CONFLICT:")){

    async deleteContact(id){ await deleteRow("Contacts","ID",id); },
    async bulkWriteContacts(contacts,lockedBy){
      const CONTACT_COLS=["id","name","company","jobRole","type","stage","email","linkedin","phone","poc","assignee","introducedBy","source","channel","warmth","lastTouchDate","nextActionDate","nextAction","checkSize","thesisFit","notes","tags","log","lastModified","modifiedBy"];
      const CONTACT_HEADERS=["ID","Name","Company","Job Role","Type","Stage","Email","LinkedIn","Phone","POC","Assignee","Introduced By","Source","Channel","Warmth","Last Touch Date","Next Action Date","Next Action","Check Size","Thesis Fit","Notes","Tags","Log (JSON)","Last Modified","Modified By"];
      const rows=contacts.map(c=>CONTACT_COLS.map(k=>{
        if(k==="log") return c.log&&c.log.length?JSON.stringify(c.log):"";
        if(k==="tags") return c.tags&&c.tags.length?c.tags.join(", "):"";
        if(k==="lastTouchDate"||k==="nextActionDate") return safeDate(c[k]);
        return c[k]!==undefined&&c[k]!==null?String(c[k]):"";
      }));
      return req({action:"bulkWrite",sheet:"Contacts",headers:CONTACT_HEADERS,rows,lockedBy:lockedBy||"unknown"});
    },

    // ── Config (workstreams, statuses, members, epics) ────────────────────
    async saveConfig(key,data){ return writeConfig("Config - "+key,data); },
    async loadConfig(key){ return readConfig("Config - "+key); },

    // ── Emoji Log ─────────────────────────────────────────────────────────────
    async loadEmojiLog(){
      const res=await readAllRows("Emoji Log");
      if(!res||!res.rows||!res.rows.length)return null;

    },
    async upsertEmojiRow(entry){

    },

    // ── Meta — lightweight lastChanged timestamp for polling ────────────────
    async readMeta(){
      const r=await req({action:"readConfig",sheet:"_meta"});

// ── RAG ───────────────────────────────────────────────────────────────────────
function ragStatus(tasks,ws){
  const now=new Date();
  const active=tasks.filter(t=>t.workstream===ws&&isActive(t));
  if(!active.length)return "green";
  const od=active.some(t=>{if(!t.deadline)return false;const d=parseDate(t.deadline);return d&&diffDays(d,now)>0;});
  const urg=active.some(t=>t.priority==="URGENT"&&t.status==="Not Started");
  if(od)return "red";if(urg)return "amber";return "green";
}
const RAG={red:{dot:"bg-red-500",label:"Needs attention",ring:"ring-red-500/40"},amber:{dot:"bg-yellow-400",label:"At risk",ring:"ring-yellow-400/30"},green:{dot:"bg-green-500",label:"On track",ring:"ring-green-500/20"}};
function PriorityHeatmap({tasks}){
  const total=tasks.length;if(!total)return null;
  const counts={URGENT:0,High:0,Medium:0,Low:0,"N/A":0};
  tasks.forEach(t=>{const p=t.priority||"N/A";if(counts[p]!==undefined)counts[p]++;});
  const segs=[{key:"URGENT",color:"bg-red-500"},{key:"High",color:"bg-orange-500"},{key:"Medium",color:"bg-yellow-500"},{key:"Low",color:"bg-slate-500"},{key:"N/A",color:"bg-gray-700"}];
  return <div className="flex h-2 rounded-full overflow-hidden gap-px mt-2">{segs.map(s=>counts[s.key]>0&&<div key={s.key} title={s.key+": "+counts[s.key]} className={"h-full "+s.color} style={{width:(counts[s.key]/total*100)+"%"}}/>)}</div>;
}

// ── WORKSTREAM CARD ───────────────────────────────────────────────────────────
function wsStyle(ws){return ws._customColor?{background:ws._customColor}:{};}
function WorkstreamCard({ws,tasks,jumpToTask,getMember,getStatus,openEdit}){
  const[expanded,setExpanded]=useState(true);
  // All non-archived tasks for this workstream, including completed
  const allTasks=tasks.filter(t=>t.workstream===ws.name&&t.status!=="Archive - Complete"&&t.status!=="Archived");
  if(!allTasks.length)return null;
  // Group by section (same mapping as MeetingPack)
  function sectionFor(status){
    if(status==="Blocked") return "blocked";
    if(status==="Ongoing"||status==="never-ending……") return "in_progress";
    if(status==="Not Started"||status==="Scheduled - TBD upcoming"||status==="Pending Ext Factors") return "pending";
    if(status==="Complete - RR") return "review";
    if(status==="Complete") return "complete";
    return null;
  }
  const SECTION_META={
    blocked:{label:"Blocked",icon:"🔴",color:"text-red-400"},
    in_progress:{label:"In Progress",icon:"🔄",color:"text-blue-400"},
    pending:{label:"Pending",icon:"⏳",color:"text-yellow-400"},
    review:{label:"Awaiting Review",icon:"✓",color:"text-green-400"},
    complete:{label:"Complete",icon:"✅",color:"text-gray-400"},
  };
  const grouped={blocked:[],in_progress:[],pending:[],review:[],complete:[]};
  allTasks.forEach(t=>{const s=sectionFor(t.status);if(s)grouped[s].push(t);});
  // Sort each by priority
  Object.keys(grouped).forEach(k=>grouped[k].sort((a,b)=>(PRIORITY_STYLE[a.priority||"N/A"].order)-(PRIORITY_STYLE[b.priority||"N/A"].order)));
  const activeCount=allTasks.filter(t=>isActive(t)).length;
  const rag=ragStatus(tasks,ws.name);const ri=RAG[rag];
  const visibleSections=["blocked","in_progress","pending","review","complete"].filter(k=>grouped[k].length>0);
  return(
    <div className={"bg-gray-900 border border-gray-800 rounded-xl overflow-hidden ring-1 "+ri.ring}>
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800 cursor-pointer select-none" onClick={()=>setExpanded(e=>!e)}>
        <div className="flex items-center gap-3 flex-wrap">
          <div className={"w-3 h-3 rounded-full flex-shrink-0 "+ws.dot} style={wsStyle(ws)}/>
          <span className="font-semibold text-gray-200">{ws.name}</span>
          <span className="text-xs text-gray-500">{activeCount} active · {allTasks.length} open</span>
          <div className="flex items-center gap-1"><div className={"w-2 h-2 rounded-full "+ri.dot}/><span className="text-xs text-gray-500">{ri.label}</span></div>
        </div>
        <div className="flex items-center gap-3"><div className="w-24"><PriorityHeatmap tasks={allTasks.filter(t=>isActive(t))}/></div><span className="text-gray-500 text-sm">{expanded?"▲":"▼"}</span></div>
      </div>
      {expanded&&<div className="p-3">
        <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))"}}>
          {visibleSections.map(secKey=>{
            const items=grouped[secKey];const m=SECTION_META[secKey];
            return(
              <div key={secKey} className="bg-gray-950/40 border border-gray-800 rounded-lg p-2.5 flex flex-col" style={{minHeight:80}}>
                <div className="flex items-center gap-2 mb-2 pb-2 border-b border-gray-800">
                  <span className="text-base">{m.icon}</span>
                  <span className={"text-xs font-semibold uppercase tracking-wide flex-1 "+m.color}>{m.label}</span>
                  <span className="text-xs text-gray-600 bg-gray-800 px-1.5 py-0.5 rounded">{items.length}</span>
                </div>
                <div className="space-y-1.5 flex-1">
                  {items.map(t=>{
                    const mb=getMember(t.assignee);
                    const now=new Date();const d=t.deadline?parseDate(t.deadline):null;const od=d&&diffDays(d,now)>0&&!t.status.includes("Complete");
                    const prog=taskProgress(t);
                    return(
                      <div key={t.id} className={"bg-gray-800/40 border border-gray-800 rounded-lg px-2.5 py-2 hover:bg-gray-800/70 cursor-pointer "+(od?"border-red-900/60":"")} onClick={()=>openEdit(t)}>
                        <div className="flex items-center gap-1.5 mb-0.5">
                          <div className={"w-1.5 h-1.5 rounded-full flex-shrink-0 "+(t.priority==="URGENT"?"bg-red-500":t.priority==="High"?"bg-orange-500":t.priority==="Medium"?"bg-yellow-500":"bg-gray-600")}/>
                          <span className="text-xs text-gray-200 truncate flex-1">{t.name}</span>
                          {mb&&<span className={"text-[10px] px-1 py-0.5 rounded "+mb.bg+" "+(mb.text||"text-white")} title={t.assignee}>{(t.assignee||"").split(" ").map(p=>p[0]).join("").slice(0,2)}</span>}
                        </div>
                        {(prog!==null||t.deadline)&&<div className="flex items-center gap-1.5 ml-3">
                          {prog!==null&&<div className="w-8 h-1 bg-gray-800 rounded-full overflow-hidden flex-shrink-0"><div className={"h-full rounded-full "+(prog===100?"bg-green-500":"bg-indigo-500")} style={{width:prog+"%"}}/></div>}
                          {t.deadline&&<span className={"text-[10px] flex-shrink-0 "+(od?"text-red-400 font-semibold":"text-gray-500")}>{od?"Overdue":t.deadline.slice(5)}</span>}
                        </div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({tasks,workstreams,members,statuses,jumpToTask,openEdit,getMember,getWS,getStatus,activityLog,meetingSchedule}){
  const now=new Date();
  const visibleTasks=tasks.filter(t=>t.status!=="Archive - Complete");
  const total=visibleTasks.length;const complete=visibleTasks.filter(t=>t.status==="Complete"||t.status==="Complete - RR"||t.status==="Archived"||t.status==="Archive - Complete").length;const pct=Math.round(complete/total*100)||0;
  const lastThu=getLastThursday(now);const nextThu=getNextThursday(now);
  // Compute next meeting from schedule (same logic as MeetingPack)
  const nextScheduledMeeting=(()=>{
    const todayStr=fmtDate(now);
    const result=[];
    const end=addDays(now,14);
    const cur=new Date(now);cur.setHours(0,0,0,0);
    while(cur<=end){
      if(cur.getDay()===4){
        const ds=fmtDate(cur);
        const override=(meetingSchedule||[]).find(m=>m.date===ds&&!m.oneOff);
        if(!override||!override.cancelled)result.push({date:ds,label:"",isRegular:true,cancelled:false});
        else result.push({date:ds,label:"",isRegular:true,cancelled:true});
      }
      cur.setDate(cur.getDate()+1);
    }
    const todayMidnight=new Date(now);todayMidnight.setHours(0,0,0,0);
    (meetingSchedule||[]).forEach(m=>{
      if(!m.oneOff)return;
      const md=parseDate(m.date);
      if(!md||md<todayMidnight||md>end)return;
      if(!result.find(r=>r.date===m.date))result.push({date:m.date,label:m.label||"",isRegular:false,cancelled:m.cancelled||false});
    });
    result.sort((a,b)=>a.date.localeCompare(b.date));
    return result.find(m=>!m.cancelled&&m.date>=todayStr)||null;
  })();
  const nextMtgDate=nextScheduledMeeting?parseDate(nextScheduledMeeting.date):nextThu;
  const {overdue,unassigned,upcoming} = React.useMemo(()=>({
    overdue: tasks.filter(t=>{if(t.status==="Archive - Complete"||t.status.includes("Complete")||!t.deadline)return false;const d=parseDate(t.deadline);return d&&diffDays(d,now)>0;}).sort((a,b)=>a.deadline.localeCompare(b.deadline)),
    unassigned: tasks.filter(t=>!t.assignee||t.assignee==="Unassigned"),
    upcoming: tasks.filter(t=>{if(t.status.includes("Complete")||!t.deadline)return false;const d=parseDate(t.deadline);if(!d)return false;const diff=diffDays(now,d);return diff>=0&&diff<=14;}).sort((a,b)=>a.deadline.localeCompare(b.deadline)),
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }),[tasks]);
  // Normalise to midnight so log entries from that day are included
  const lastThuMidnight=new Date(lastThu);lastThuMidnight.setHours(0,0,0,0);
  const sinceLastThu=activityLog.filter(e=>{const d=parseDate(e.date);return d&&d>=lastThuMidnight;});
  // Show all workstreams that have at least one task (even completed)
  const activeWS=workstreams.filter(ws=>tasks.some(t=>t.workstream===ws.name&&t.status!=="Archive - Complete"));
  const ro={red:0,amber:1,green:2};
  const sortedWS=[...activeWS].sort((a,b)=>ro[ragStatus(tasks,a.name)]-ro[ragStatus(tasks,b.name)]);
  return(
    <div className="w-full">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-2">
        <h2 className="text-2xl font-bold">Dashboard</h2>
        <div className="flex items-center gap-4">
          <div className="text-right"><div className="text-gray-400 text-xs">Today</div><div className="text-white font-semibold">{now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div></div>
          <div className="bg-indigo-900/50 border border-indigo-700 rounded-xl px-4 py-2 text-right"><div className="text-indigo-300 text-xs">Next Meeting</div><div className="text-white font-semibold text-sm">{nextMtgDate.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long"})}{nextScheduledMeeting&&nextScheduledMeeting.label&&<span className="text-indigo-300 text-xs ml-1.5">— {nextScheduledMeeting.label}</span>}</div></div>
        </div>
      </div>
      <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-5">
        <div className="flex items-start justify-between gap-6 flex-wrap mb-4">
          <div>
            <div className="text-xs text-gray-500 mb-2">Overall completion</div>
            <div className="flex items-baseline gap-2"><span className="text-4xl font-bold" style={{fontFamily:"'Verdana Pro',Verdana,sans-serif",color:"var(--ls-blue)"}}>{pct}%</span><span className="text-gray-400 text-sm">{complete} of {total}</span></div>
            <div className="h-2 bg-gray-800 rounded-full overflow-hidden mt-2 w-48"><div className="h-full bg-indigo-500 rounded-full" style={{width:pct+"%"}}/></div>
          </div>
          <div className="flex gap-5 flex-wrap">
            {[{label:"Active",val:visibleTasks.filter(t=>isActive(t)).length,color:"text-indigo-400"},{label:"Ongoing",val:visibleTasks.filter(t=>t.status==="Ongoing").length,color:"text-blue-400"},{label:"Completed ↑",val:sinceLastThu.filter(e=>e.type==="task_complete").length,color:"text-green-400",sub:"since Thu"},{label:"Added ↑",val:sinceLastThu.filter(e=>e.type==="task_add").length,color:"text-sky-400",sub:"since Thu"}].map(s=><div key={s.label}><div className={"text-2xl font-bold "+s.color}>{s.val}</div><div className="text-gray-500 text-xs mt-0.5">{s.label}</div>{s.sub&&<div className="text-gray-600 text-xs">{s.sub}</div>}</div>)}
          </div>
        </div>
      </div>
      <div className="mb-1"><h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">Needs Attention</h3></div>
      <div className="grid grid-cols-1 gap-3 mb-5 md:grid-cols-2">
        <div className={"bg-gray-900 rounded-xl border p-4 "+(overdue.length?"border-red-800":"border-gray-800")}><div className="flex items-center gap-2 mb-3"><div className={"w-2 h-2 rounded-full "+(overdue.length?"bg-red-500":"bg-gray-600")}/><h3 className="font-semibold text-sm text-gray-200">Overdue</h3><span className={"text-xs px-2 py-0.5 rounded-full font-bold "+(overdue.length?"bg-red-900 text-red-300":"bg-gray-800 text-gray-500")}>{overdue.length}</span></div>{overdue.length===0?<p className="text-gray-600 text-xs">None</p>:<div className="space-y-1.5">{overdue.slice(0,5).map(t=>{const mb=getMember(t.assignee);return <div key={t.id} className="flex items-center gap-2 cursor-pointer hover:bg-gray-800 rounded-lg px-2 py-1 -mx-2" onClick={()=>openEdit(t)}><Avatar member={mb}/><span className="flex-1 text-xs text-gray-300 truncate">{t.name}</span><span className="text-xs text-red-400 font-semibold">{t.deadline}</span></div>;})}{overdue.length>5&&<p className="text-xs text-gray-500">+{overdue.length-5} more</p>}</div>}</div>
        <div className={"bg-gray-900 rounded-xl border p-4 "+(unassigned.length?"border-yellow-800":"border-gray-800")}><div className="flex items-center gap-2 mb-3"><div className={"w-2 h-2 rounded-full "+(unassigned.length?"bg-yellow-400":"bg-gray-600")}/><h3 className="font-semibold text-sm text-gray-200">Unassigned</h3><span className={"text-xs px-2 py-0.5 rounded-full font-bold "+(unassigned.length?"bg-yellow-900 text-yellow-300":"bg-gray-800 text-gray-500")}>{unassigned.length}</span></div>{unassigned.length===0?<p className="text-gray-600 text-xs">All assigned.</p>:<div className="space-y-1.5">{unassigned.slice(0,5).map(t=>{const ws=getWS(t.workstream);return <div key={t.id} className="flex items-center gap-2 cursor-pointer hover:bg-gray-800 rounded-lg px-2 py-1 -mx-2" onClick={()=>openEdit(t)}><div className={"w-2 h-2 rounded-full flex-shrink-0 "+ws.dot}/><span className="flex-1 text-xs text-gray-300 truncate">{t.name}</span></div>;})}{unassigned.length>5&&<p className="text-xs text-gray-500">+{unassigned.length-5} more</p>}</div>}</div>
      </div>
      {upcoming.length>0&&<div className="bg-gray-900 rounded-xl border border-gray-800 p-4 mb-5"><h3 className="font-semibold text-sm text-gray-200 mb-3">Upcoming — next 14 days</h3><div className="space-y-1.5">{upcoming.map(t=>{const mb=getMember(t.assignee);const st=getStatus(t.status);const d=parseDate(t.deadline);const dl=d?diffDays(now,d):null;return <div key={t.id} className={"flex items-center gap-3 cursor-pointer hover:bg-gray-800 rounded-lg px-2 py-1.5 -mx-2 "+(dl===0?"bg-amber-900/30 ring-1 ring-amber-700/50 rounded-lg":"")} onClick={()=>openEdit(t)}><Avatar member={mb}/><span className="flex-1 text-sm text-gray-200 truncate">{t.name}</span><span className={"px-2 py-0.5 rounded text-xs font-semibold "+st.badge}>{t.status}</span><span className={"text-xs flex-shrink-0 "+(dl===0?"text-orange-400 font-bold":dl<=3?"text-yellow-400":"text-gray-400")}>{dl===0?"🔔 Today":dl===1?"Tomorrow":"in "+dl+"d"}</span></div>;})} </div></div>}
      <div className="space-y-3">
        <div className="flex items-center justify-between mb-1"><h3 className="font-semibold text-gray-200">Workstreams</h3><div className="flex items-center gap-4 text-xs text-gray-500">{Object.entries(RAG).map(([k,v])=><div key={k} className="flex items-center gap-1"><div className={"w-2 h-2 rounded-full "+v.dot}/>{v.label}</div>)}</div></div>
        {sortedWS.map(ws=><WorkstreamCard key={ws.id} ws={ws} tasks={tasks} jumpToTask={jumpToTask} getMember={getMember} getStatus={getStatus} openEdit={openEdit}/>)}
        {sortedWS.length===0&&<div className="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center"><div className="text-3xl mb-2 opacity-40">📋</div><p className="text-gray-400 text-sm mb-1">No workstreams with active tasks</p><p className="text-gray-600 text-xs">Add a task in the Tasks tab to get started</p></div>}
      </div>
    </div>
  );
}

function getISOWeek(d){const date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);const week1=new Date(date.getFullYear(),0,4);return date.getFullYear()+"-W"+String(1+Math.round(((date.getTime()-week1.getTime())/86400000-3+(week1.getDay()+6)%7)/7)).padStart(2,"0");}
function getThursdayOfWeek(isoWeek){const[yearStr,wStr]=isoWeek.split("-W");const week=parseInt(wStr);const jan4=new Date(parseInt(yearStr),0,4);const mon=new Date(jan4);mon.setDate(jan4.getDate()-(jan4.getDay()+6)%7+(week-1)*7);const thu=new Date(mon);thu.setDate(mon.getDate()+3);return thu;}

// ── EMOJI TRACKER ─────────────────────────────────────────────────────────────
function EmojiTracker({members,emojiLog,setEmojiLog,gsClientRef,gsConnected}){
  const[expanded,setExpanded]=useState(false);
  const[saving,setSaving]=useState(false);
  const[activeMember,setActiveMember]=useState(null);
  const[activeCat,setActiveCat]=useState("positive");
  const thisWeek=getISOWeek(new Date());
  const teamMembers=members.filter(m=>m.name!=="Unassigned");
  function getEntry(name){return emojiLog.find(e=>e.week===thisWeek&&e.member===name);}
  function setEmoji(name,emoji){
    const existing=getEntry(name);
    const thu=getThursdayOfWeek(thisWeek);
    const entry={id:existing?existing.id:uid("emj"),week:thisWeek,member:name,emoji,date:fmtDate(thu)};
    setEmojiLog(log=>[...log.filter(e=>!(e.week===thisWeek&&e.member===name)),entry]);
    setActiveMember(null);
    if(gsClientRef.current&&gsConnected){setSaving(true);gsClientRef.current.upsertEmojiRow(entry).catch(err=>console.error("Emoji save:",err)).finally(()=>setSaving(false));}
  }
  const allCheckedIn=teamMembers.every(m=>getEntry(m.name));
  const checkedCount=teamMembers.filter(m=>getEntry(m.name)).length;
  const allWeeks=[...new Set(emojiLog.map(e=>e.week))].sort().reverse().slice(0,9);
  const historyWeeks=allWeeks.filter(w=>w!==thisWeek).slice(0,6);
  return(
    <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4">
      <div className="flex items-center justify-between px-4 py-3 cursor-pointer select-none" onClick={()=>setExpanded(x=>!x)}>
        <div className="flex items-center gap-3">
          <div className="w-2 h-2 rounded-full bg-violet-400"/>
          <span className="font-semibold text-gray-200">Feelings Check-In</span>
          <div className="flex items-center gap-1">
            {teamMembers.map(m=>{const e=getEntry(m.name);return <span key={m.id} title={m.name+(e?" — "+e.emoji:"")} className="text-base">{e?e.emoji:<span className="inline-block w-5 h-5 rounded-full bg-gray-700 border border-gray-600 text-center leading-5 text-gray-500 text-xs">?</span>}</span>;})}
          </div>
          {saving&&<span className="text-xs text-amber-400 animate-pulse">Saving...</span>}
        </div>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-500">{checkedCount}/{teamMembers.length}</span>
          <span className="text-gray-500 text-xs">{expanded?"▲":"▼"}</span>
        </div>
      </div>
      {expanded&&<div className="border-t border-gray-800 p-4">
        {/* Person selector row */}
        <div className="flex flex-wrap gap-2 mb-3">
          {teamMembers.map(m=>{
            const entry=getEntry(m.name);
            const isActive=activeMember===m.name;
            return(
              <button key={m.id} onClick={()=>setActiveMember(isActive?null:m.name)}
                className={"flex items-center gap-2 px-3 py-1.5 rounded-xl border text-sm transition-all "+(isActive?"border-indigo-500 bg-indigo-900/40 text-white":"border-gray-700 bg-gray-800 text-gray-300 hover:border-gray-600")}>
                <div className={m.bg+" "+(m.text||"text-white")+" w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"}>{m.name[0]}</div>
                <span>{m.name}</span>
                {entry&&<span className="text-base">{entry.emoji}</span>}
              </button>
            );
          })}
        </div>
        {/* Emoji picker — shows only when a member is selected */}
        {activeMember&&<div className="bg-gray-800 rounded-xl p-3 mb-3">
          <p className="text-xs text-gray-400 mb-2">How is <span className="text-white font-medium">{activeMember}</span> feeling?</p>
          {/* Category tabs */}
          <div className="flex flex-wrap gap-1 mb-3 pb-2 border-b border-gray-700">
            {MOOD_EMOJI_CATEGORIES.map(c=>(
              <button key={c.id} onClick={()=>setActiveCat(c.id)}
                className={"flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs transition-all "+(activeCat===c.id?"bg-indigo-600 text-white":"bg-gray-700 text-gray-300 hover:bg-gray-600")}>
                <span className="text-base leading-none">{c.icon}</span><span>{c.label}</span>
              </button>
            ))}
          </div>
          {/* Filtered grid (8 cols, larger buttons) */}
          <div className="grid gap-1.5" style={{gridTemplateColumns:"repeat(auto-fill,minmax(44px,1fr))"}}>
            {MOOD_EMOJIS.filter(m=>m.cat===activeCat).map(({e,label})=>{

                className={"h-11 rounded-lg text-2xl flex items-center justify-center transition-all "+(current&&current.emoji===e?"bg-indigo-600 ring-2 ring-indigo-400 scale-110":"bg-gray-700 hover:bg-gray-600 hover:scale-105")}>{e}</button>;
            })}
          </div>
        </div>}
        {/* History table */}
        {historyWeeks.length>0&&<div className="mt-1 pt-3 border-t border-gray-800">
          <p className="text-xs text-gray-500 uppercase tracking-wide mb-2">Previous weeks</p>
          <div className="overflow-x-auto">
            <table className="text-sm w-auto">
              <thead><tr>
                <th className="text-left pr-3 pb-1 text-xs text-gray-600 font-normal w-16"></th>
                {historyWeeks.map(w=>{const thu=getThursdayOfWeek(w);return <th key={w} className="px-2 pb-1 text-xs text-gray-600 font-normal text-center whitespace-nowrap">{thu.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</th>;})}
              </tr></thead>
              <tbody>
                {teamMembers.map(m=>(
                  <tr key={m.id} className="border-t border-gray-800/60">
                    <td className="pr-3 py-1 text-xs text-gray-400 whitespace-nowrap">{m.name}</td>
                    {historyWeeks.map(w=>{const entry=emojiLog.find(e=>e.week===w&&e.member===m.name);return <td key={w} className="px-2 py-1 text-center text-base" title={entry?entry.date:""}>{entry?entry.emoji:<span className="text-gray-700 text-xs">—</span>}</td>;})}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>}
      </div>}
    </div>
  );
}
