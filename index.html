// ── MEETING PACK ──────────────────────────────────────────────────────────────
function MeetingPack({tasks,setTasks,workstreams,getMember,getStatus,jumpToTask,openEdit,members,agendaText,setAgendaText,agendaStructure,gsClientRef,gsConnected,emojiLog,setEmojiLog,meetingMode,meetingAttendees,toggleAttendee,startMeeting,endMeeting,meetingSchedule,setMeetingSchedule,agendaHistory,setAgendaHistory,workstreamHealth,setWorkstreamHealth,decisions,setDecisions,addLog,meetingStartTime,meetingTick}){
  const now=new Date();
  const todayStr=fmtDate(now);

  // ── Compute the effective schedule (Thursdays + one-offs, 2 weeks ahead) ──────
  function getScheduledMeetings(){
    const result=[];
    const end=addDays(now,14);
    // Generate all Thursdays in range
    let d=new Date(now);
    d.setHours(0,0,0,0);
    // Walk forward day by day finding Thursdays
    const cur=new Date(d);
    while(cur<=end){
      if(cur.getDay()===4){
        const ds=fmtDate(cur);
        const override=meetingSchedule.find(m=>m.date===ds);
        if(!override||!override.cancelled){
          result.push({date:ds,label:"",isRegular:true,cancelled:false,id:"thu_"+ds});
        } else {
          result.push({date:ds,label:"",isRegular:true,cancelled:true,id:"thu_"+ds});
        }
      }
      cur.setDate(cur.getDate()+1);
    }
    // Add one-off meetings from schedule that aren't Thursdays and are in range
    const todayMidnight=new Date(now);todayMidnight.setHours(0,0,0,0);
    meetingSchedule.forEach(m=>{
      if(!m.oneOff) return;
      const md=parseDate(m.date);
      if(!md||md<todayMidnight||md>end) return;
      if(!result.find(r=>r.date===m.date)){
        result.push({date:m.date,label:m.label||"",isRegular:false,cancelled:m.cancelled||false,id:m.id});
      }
    });
    result.sort((a,b)=>a.date.localeCompare(b.date));
    return result;
  }

  const scheduledMeetings=getScheduledMeetings();
  // Next upcoming non-cancelled meeting
  const nextMeeting=scheduledMeetings.find(m=>!m.cancelled&&m.date>=todayStr)||scheduledMeetings[0];

  // ── Task sections (memoised — re-runs only when tasks/nextMeeting changes) ─
  const nextMeetingDate=nextMeeting?parseDate(nextMeeting.date):getNextThursday(now);
  const lastThu=getLastThursday(now);
  const {actionRequired,needsReview,notReviewed} = React.useMemo(()=>{
    const overdue=tasks.filter(t=>{if(t.status==="Archive - Complete"||t.status==="Archived"||t.status.includes("Complete"))return false;const d=parseDate(t.deadline);return d&&diffDays(d,now)>0;});
    const dueBeforeNext=tasks.filter(t=>{if(t.status==="Archive - Complete"||t.status==="Archived"||t.status.includes("Complete"))return false;const d=parseDate(t.deadline);if(!d)return false;const daysToMeeting=nextMeetingDate?diffDays(now,nextMeetingDate):7;return diffDays(now,d)>=0&&diffDays(now,d)<=daysToMeeting;});
    const actionRequired=[...overdue,...dueBeforeNext.filter(t=>!overdue.find(o=>o.id===t.id))].sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));
    const needsReview=tasks.filter(t=>t.status==="Complete - RR");
    const lastThuMid=new Date(lastThu);lastThuMid.setHours(0,0,0,0);
    const notReviewed=tasks.filter(t=>{if(!isActive(t))return false;if(!t.lastReviewed)return true;const lr=parseDate(t.lastReviewed);return lr&&lr<lastThuMid;}).sort((a,b)=>(PRIORITY_STYLE[a.priority||"N/A"].order)-(PRIORITY_STYLE[b.priority||"N/A"].order));
    return {actionRequired,needsReview,notReviewed};
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[tasks,nextMeeting&&nextMeeting.date]);

  // ── Agenda save / history ─────────────────────────────────────────────────
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  function handleChange(val){setAgendaText(val);setSaved(false);}

  async function saveAgenda(){
    if(!agendaText||!agendaText.trim()) return;
    setSaving(true);
    // Archive the current agenda under the next meeting date
    if(nextMeeting){
      const dateKey=nextMeeting.date;
      const label=nextMeeting.label||"";
      const entry={date:dateKey,label,savedAt:new Date().toISOString(),text:agendaText};
      setAgendaHistory(h=>{
        const filtered=h.filter(x=>x.date!==dateKey);
        return [entry,...filtered].slice(0,52);
      });
    }
    // Always save to localStorage as a backup; also save to Sheets when connected
    try{localStorage.setItem("ls_agenda",JSON.stringify({text:agendaText,updatedAt:new Date().toISOString()}));}catch(e){}
    if(gsClientRef.current&&gsConnected){
      try{
        await gsClientRef.current.saveConfig("Agenda",{text:agendaText,updatedAt:new Date().toISOString()});
        setSaved(true);
      }catch(err){console.error("Agenda save:",err);setSaved(true);}
    } else {
      setSaved(true);
    }
    setSaving(false);
    setTimeout(()=>setSaved(false),2500);
  }

  function TR({t}){const mb=getMember(t.assignee);const st=getStatus(t.status);const pri=PRIORITY_STYLE[t.priority||"N/A"];return <div className="flex items-center gap-3 px-3 py-2 hover:bg-gray-800/50 cursor-pointer rounded-lg" onClick={()=>{if(openEdit)openEdit(t);else jumpToTask(t.id);}} title="Click to edit task"><span className={"w-2.5 h-2.5 rounded-full flex-shrink-0 ring-2 "+pri.dot+" "+pri.dotRing} title={"Priority: "+(t.priority||"N/A")}/><Avatar member={mb}/><span className="flex-1 text-sm text-gray-200 truncate">{t.name}</span><span className={"px-2 py-0.5 rounded text-xs font-semibold "+st.badge}>{t.status}</span>{t.deadline&&<span className="text-xs text-gray-400 flex-shrink-0">{t.deadline}</span>}</div>;}
  function Sec({title,items,color,empty}){const[open,setOpen]=useState(true);return <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4"><div className="flex items-center justify-between px-4 py-3 border-b border-gray-800 cursor-pointer" onClick={()=>setOpen(o=>!o)}><div className="flex items-center gap-2"><div className={"w-2 h-2 rounded-full "+color}/><span className="font-semibold text-gray-200">{title}</span><span className="text-xs text-gray-500">{items.length}</span></div><span className="text-gray-500 text-sm">{open?"▲":"▼"}</span></div>{open&&<div className="p-2">{items.length===0?<p className="text-gray-600 text-xs px-3 py-2">{empty}</p>:items.map(t=><TR key={t.id} t={t}/>)}</div>}</div>;}

  function fmtMeetingDate(ds){
    const d=parseDate(ds);
    if(!d)return ds;
    return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  }

  // Meeting timer display
  function formatDuration(startISO){
    if(!startISO)return "";
    const start=new Date(startISO);
    const elapsed=Math.floor((new Date()-start)/1000);
    const h=Math.floor(elapsed/3600);
    const m=Math.floor((elapsed%3600)/60);
    const s=elapsed%60;
    if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  }
  return(
    <div className="w-full">
      {/* Meeting mode banner — live timer */}
      {meetingMode&&<div className="bg-indigo-900/40 border border-indigo-700 rounded-xl px-4 py-2.5 mb-4 flex items-center justify-between gap-3 flex-wrap">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="w-2 h-2 rounded-full bg-indigo-400 animate-pulse flex-shrink-0"/>
          <span className="text-sm text-indigo-200 font-medium">Meeting in progress</span>
          {meetingStartTime&&<span className="text-xs text-indigo-300 font-mono bg-indigo-950/40 px-2 py-0.5 rounded" title="Live duration">⏱ {formatDuration(meetingStartTime)/* uses meetingTick to re-render */}{meetingTick>=0?"":""}</span>}
          {meetingStartTime&&<span className="text-xs text-indigo-400">started {fmtTime(new Date(meetingStartTime))}</span>}
          <span className="text-xs text-indigo-400">· {meetingAttendees.join(", ")||"no attendees"}</span>
        </div>
        <button onClick={endMeeting} className="bg-red-900/60 hover:bg-red-800 border border-red-700 px-3 py-1.5 rounded-lg text-xs text-red-200 font-medium">🔴 End Meeting</button>
      </div>}

      {/* Header — two-line layout: title + meeting badge on top, controls below */}
      <div className="mb-5">
        <div className="flex items-baseline justify-between gap-3 flex-wrap mb-3">
          <h2 className="text-2xl font-bold">Meeting Pack</h2>
          {nextMeeting&&<div className="bg-indigo-900/50 border border-indigo-700 rounded-xl px-4 py-2 flex items-baseline gap-3">
            <span className="text-indigo-300 text-xs uppercase tracking-wide">Next Meeting</span>
            <span className="text-white font-semibold text-sm">{fmtMeetingDate(nextMeeting.date)}</span>
            {nextMeeting.label&&<span className="text-indigo-300 text-xs">— {nextMeeting.label}</span>}
          </div>}
        </div>
        {!meetingMode&&<div className="flex justify-end"><MeetingSetupPanel members={members} meetingAttendees={meetingAttendees} toggleAttendee={toggleAttendee} startMeeting={startMeeting}/></div>}
      </div>

      <EmojiTracker members={members} emojiLog={emojiLog} setEmojiLog={setEmojiLog} gsClientRef={gsClientRef} gsConnected={gsConnected}/>

      {/* ── MEETING AGENDA — selectable date ─────────────────────────────── */}
      <AgendaPanel
        nextMeeting={nextMeeting} agendaText={agendaText} setAgendaText={setAgendaText}
        agendaStructure={agendaStructure} agendaHistory={agendaHistory}
        setAgendaHistory={setAgendaHistory} saveAgenda={saveAgenda} saving={saving} saved={saved}
        handleChange={handleChange} setSaved={setSaved} fmtMeetingDate={fmtMeetingDate}
        scheduledMeetings={scheduledMeetings} setMeetingSchedule={setMeetingSchedule} meetingSchedule={meetingSchedule}
      />

      {/* ── WORKSTREAM STATUS — health + per-task discussion notes ───────── */}
      <WorkstreamStatusSection
        tasks={tasks} setTasks={setTasks} workstreams={workstreams} getMember={getMember}
        workstreamHealth={workstreamHealth} setWorkstreamHealth={setWorkstreamHealth}
        nextMeeting={nextMeeting} jumpToTask={jumpToTask} openEdit={openEdit} meetingMode={meetingMode}
        agendaText={agendaText} addLog={addLog}
      />

      {/* ── DECISIONS LOGGED THIS MEETING ─────────────────────────────────── */}
      <MeetingDecisions
        decisions={decisions} setDecisions={setDecisions}
        members={members} workstreams={workstreams}
        nextMeeting={nextMeeting} addLog={addLog}
        meetingMode={meetingMode} meetingAttendees={meetingAttendees}
      />

      <Sec title="Complete — Requires Review" items={needsReview} color="bg-green-500" empty="None awaiting review."/>
      <Sec title="Action Required" items={actionRequired} color="bg-red-500" empty="Nothing overdue or due before next meeting. 🎉"/>
      <Sec title="Not Reviewed Since Last Thursday" items={notReviewed} color="bg-yellow-400" empty="All reviewed recently."/>
    </div>
  );
}

// ── WorkstreamKanban (Work-tab subtab) ──────────────────────────────────────
// Group cards by workstream rather than status. Drag-drop between workstreams
// updates task.workstream. A synthetic "Unassigned" workstream gathers tasks
// with empty/unknown workstream values.
function WorkstreamKanban({tasks,setTasks,workstreams,members,filterMember,setFilterMember,listSort,setListSort,openNew,openEdit,getMember,addLog}){
  // Visible tasks: hide Archive - Complete, apply member filter
  const visibleTasks=tasks.filter(t=>t.status!=="Archive - Complete"&&t.status!=="Archived"&&(filterMember==="All"||t.assignee===filterMember));
  // Build columns: real workstreams + a synthetic Unassigned bucket
  const wsNames=new Set(workstreams.map(w=>w.name));
  const unassignedTasks=visibleTasks.filter(t=>!t.workstream||!wsNames.has(t.workstream));
  const UNASSIGNED_WS={id:"__unassigned__",name:"Unassigned",color:"bg-slate-700",text:"text-slate-100",dot:"bg-slate-500",border:"border-slate-500",isUnassigned:true};
  const columns=[...workstreams.map(w=>({ws:w,tasks:visibleTasks.filter(t=>t.workstream===w.name)})),
                 {ws:UNASSIGNED_WS,tasks:unassignedTasks}];
  // Sort within each column
  function sortTasks(arr){
    const{col:sc,dir}=listSort;const d=dir==="asc"?1:-1;
    return [...arr].sort((a,b)=>{
      if(sc==="priority") return d*((PRIORITY_STYLE[a.priority||"N/A"].order)-(PRIORITY_STYLE[b.priority||"N/A"].order));
      if(sc==="name") return d*(a.name||"").localeCompare(b.name||"");
      if(sc==="deadline"){const da=a.deadline||"9999",db=b.deadline||"9999";return d*(da.localeCompare(db));}
      return 0;
    });
  }
  const[dragId,setDragId]=useState(null);
  function handleDrop(targetWs){
    if(!dragId) return;
    const newWsName=targetWs.isUnassigned?"":targetWs.name;
    setTasks(ts=>ts.map(t=>{
      if(t.id!==dragId) return t;
      if(t.workstream===newWsName) return t;
      return Object.assign({},t,{workstream:newWsName,lastModified:new Date().toISOString()});
    }));
    if(addLog) addLog("workstream_change","Moved to workstream "+(newWsName||"Unassigned"));
    setDragId(null);
  }
  return(
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <div>
          <h2 className="text-2xl font-bold">By Workstream</h2>
          <p className="text-xs text-gray-500 mt-1">Drag a card between columns to change its workstream.</p>
        </div>
        <div className="flex items-center gap-2">
          <select value={listSort.col+"_"+listSort.dir} onChange={e=>{const[col,dir]=e.target.value.split("_");setListSort({col,dir});}} className="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200">
            <option value="priority_asc">Priority ↑</option>
            <option value="name_asc">Name A–Z</option>
            <option value="name_desc">Name Z–A</option>
            <option value="deadline_asc">Deadline ↑</option>
            <option value="deadline_desc">Deadline ↓</option>
          </select>
          <button onClick={openNew} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm font-medium">+ New Task</button>
        </div>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {["All",...members.filter(m=>m.name!=="Unassigned").map(m=>m.name)].map(m=>(
          <button key={m} onClick={()=>setFilterMember(m)}
            className={"px-3 py-1 rounded text-sm "+(filterMember===m?"bg-indigo-600 text-white":"bg-gray-800 text-gray-400 hover:text-white")}>
            {m}
          </button>
        ))}
      </div>
      <div style={{overflowX:"auto",overflowY:"visible",paddingBottom:"1rem"}}>
        <div style={{display:"flex",gap:"12px",minWidth:"max-content",paddingBottom:"2px"}}>
          {columns.map(({ws,tasks:colTasks})=>{
            const sorted=sortTasks(colTasks);
            const isUnassigned=ws.isUnassigned;
            return(
              <div key={ws.id}
                className={"flex-shrink-0 w-72 rounded-xl border-t-2 "+ws.border+" "+(isUnassigned?"bg-gray-900/40 border-dashed":"bg-gray-900")+ " p-3"}
                onDragOver={e=>e.preventDefault()}
                onDrop={()=>handleDrop(ws)}>
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <div className={"w-2.5 h-2.5 rounded-full "+ws.dot}/>
                    <span className={"text-sm font-semibold "+(isUnassigned?"text-gray-400":"text-gray-200")}>{ws.name}</span>
                  </div>
                  <span className="text-xs bg-gray-800 rounded-full px-2 py-0.5 text-gray-400">{sorted.length}</span>
                </div>
                <div className="space-y-2 min-h-[40px]">
                  {sorted.length===0
                    ?<p className="text-xs text-gray-700 italic px-1 py-2">{dragId?"Drop here":(isUnassigned?"No unassigned tasks.":"No tasks.")}</p>
                    :sorted.map(t=>{
                      const mb=getMember(t.assignee);
                      const prog=taskProgress(t);
                      const pri=PRIORITY_STYLE[t.priority||"N/A"];
                      const status=t.status||"";
                      return(
                        <div key={t.id}
                          draggable
                          onDragStart={e=>{setDragId(t.id);e.dataTransfer.effectAllowed="move";}}
                          onDragEnd={()=>setDragId(null)}
                          onClick={()=>openEdit(t)}
                          className={"bg-gray-800 rounded-lg overflow-hidden border border-gray-700 cursor-grab active:cursor-grabbing hover:bg-gray-700 "+(dragId===t.id?"opacity-40":"")}>
                          <div className={"h-1 w-full "+(ws.dot||"bg-gray-600")} style={ws.isUnassigned?{}:wsStyle(ws)}/>
                          <div className="p-3">
                            <div className="flex items-start gap-2 mb-1">
                              <span className={"w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1 ring-2 "+pri.dot+" "+pri.dotRing} title={"Priority: "+(t.priority||"N/A")}/>
                              <div className="text-sm font-medium text-gray-200 leading-snug flex-1">{t.name}</div>
                            </div>
                            {prog!==null&&<div className="mb-2 ml-4">
                              <div className="flex justify-between text-xs text-gray-400 mb-0.5"><span>Checklist</span><span>{prog}%</span></div>
                              <div className="h-1.5 bg-gray-700 rounded-full overflow-hidden"><div className={"h-full rounded-full "+(ws.dot||"bg-gray-500")} style={{width:prog+"%"}}/></div>
                            </div>}
                            <div className="flex items-center justify-between gap-2 ml-4">
                              <span className="text-xs text-gray-400 truncate" title={status}>{status||"—"}</span>
                              <Avatar member={mb}/>
                            </div>
                            {t.deadline&&<div className="text-xs text-gray-500 mt-1 ml-4">Due {t.deadline}</div>}
                          </div>
                        </div>
                      );
                    })
                  }
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


// ── WorkstreamStatusSection ─────────────────────────────────────────────────
function WorkstreamStatusSection({tasks,setTasks,workstreams,getMember,workstreamHealth,setWorkstreamHealth,nextMeeting,jumpToTask,openEdit,meetingMode,agendaText,addLog}){
  const meetingDateKey=nextMeeting?nextMeeting.date:fmtDate(getNextThursday(new Date()));
  // Group tasks per workstream and per "section"
  // Now 5 sections: Blocked / In Progress / TBD-Schedule-this-week / Pending / Awaiting Review
  function sectionFor(status){
    if(status==="Blocked") return "blocked";
    if(status==="Ongoing"||status==="never-ending……") return "in_progress";
    if(status==="Scheduled - TBD upcoming") return "tbd";
    if(status==="Not Started"||status==="Pending Ext Factors") return "pending";
    if(status==="Complete - RR") return "review";
    return null; // hide Complete, Archive - Complete, Archived
  }
  // Canonical default status when dragging *into* a section
  const SECTION_DEFAULT_STATUS={
    blocked:"Blocked",
    in_progress:"Ongoing",
    tbd:"Scheduled - TBD upcoming",
    pending:"Not Started",
    review:"Complete - RR",
  };
  const SECTION_ORDER=["blocked","in_progress","tbd","pending","review"];
  const SECTION_META={
    blocked:{label:"Blocked",icon:"🔴",color:"text-red-400",border:"border-red-900/40",bg:"bg-red-950/20"},
    in_progress:{label:"In Progress",icon:"🔄",color:"text-blue-400",border:"border-blue-900/40",bg:"bg-blue-950/20"},
    tbd:{label:"Schedule this week",icon:"⏳",color:"text-sky-400",border:"border-sky-900/40",bg:"bg-sky-950/20"},
    pending:{label:"Pending",icon:"⌛",color:"text-yellow-400",border:"border-yellow-900/40",bg:"bg-yellow-950/20"},
    review:{label:"Awaiting Review",icon:"✓",color:"text-green-400",border:"border-green-900/40",bg:"bg-green-950/20"},
  };
  const HEALTH_META={
    green:{label:"On track",dot:"#15803d",bg:"rgba(21,128,61,0.18)",border:"#15803d"},
    amber:{label:"At risk",dot:"#b45309",bg:"rgba(180,83,9,0.18)",border:"#b45309"},
    red:{label:"Blocked",dot:"#e52626",bg:"rgba(229,38,38,0.18)",border:"#e52626"},
    "":{label:"Set health",dot:"#6b7280",bg:"transparent",border:"#374151"},
  };

  // Drag state — { taskId, fromSection }
  const[drag,setDrag]=useState(null);

  // Parse agenda text → which lines mention which workstream
  function agendaItemsForWorkstream(wsName){
    if(!agendaText||!wsName) return [];
    const lines=agendaText.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const lower=wsName.toLowerCase();
    return lines.filter(line=>line.toLowerCase().includes(lower));
  }

  function moveTaskToSection(taskId,toSection){
    const newStatus=SECTION_DEFAULT_STATUS[toSection];
    if(!newStatus) return;
    setTasks(ts=>ts.map(t=>{
      if(t.id!==taskId) return t;
      if(t.status===newStatus) return t; // no-op
      const isComp=newStatus==="Complete";
      return Object.assign({},t,{
        status:newStatus,
        lastModified:new Date().toISOString(),
      },isComp&&!t.completionDate?{completionDate:fmtDate(new Date())}:{});
    }));
    if(addLog) addLog("status_change","Moved task to "+newStatus+" via Workstream Status drag");
  }

  function moveTaskToWorkstream(taskId,toWsName){
    setTasks(ts=>ts.map(t=>t.id===taskId?Object.assign({},t,{workstream:toWsName,lastModified:new Date().toISOString()}):t));
    if(addLog) addLog("workstream_change","Moved task to workstream "+toWsName);
  }

  return(
    <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4">
      <div className="px-4 py-3 border-b border-gray-800 flex items-center gap-2">
        <div className="w-2 h-2 rounded-full bg-cyan-400"/>
        <span className="font-semibold text-gray-200">Workstream Status</span>
        <span className="text-xs text-gray-500">— per-workstream update for {fmtMeetingShort(nextMeeting?nextMeeting.date:fmtDate(getNextThursday(new Date())))}</span>
        <span className="ml-auto text-xs text-gray-600 hidden md:inline">↔ scroll horizontally · drag cards between sections</span>
      </div>
      {/* Horizontal scrolling container with workstream columns */}
      <div style={{overflowX:"auto",overflowY:"visible"}}>
        <div className="flex gap-3 p-3" style={{minWidth:"max-content"}}>
          {workstreams.map(ws=>(
            <WorkstreamColumn key={ws.id}
              ws={ws}
              tasks={tasks.filter(t=>t.workstream===ws.name)}
              sectionFor={sectionFor}
              SECTION_ORDER={SECTION_ORDER}
              SECTION_META={SECTION_META}
              HEALTH_META={HEALTH_META}
              health={workstreamHealth[ws.name]||{health:"",status:""}}
              onHealthChange={v=>setWorkstreamHealth(h=>Object.assign({},h,{[ws.name]:Object.assign({},h[ws.name]||{},v,{updatedAt:new Date().toISOString()})}))}
              getMember={getMember}
              jumpToTask={jumpToTask}
              openEdit={openEdit}
              setTasks={setTasks}
              meetingDateKey={meetingDateKey}
              meetingMode={meetingMode}
              agendaItems={agendaItemsForWorkstream(ws.name)}
              drag={drag} setDrag={setDrag}
              moveTaskToSection={moveTaskToSection}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

function WorkstreamColumn({ws,tasks,sectionFor,SECTION_ORDER,SECTION_META,HEALTH_META,health,onHealthChange,getMember,jumpToTask,openEdit,setTasks,meetingDateKey,meetingMode,agendaItems,drag,setDrag,moveTaskToSection}){
  // Group tasks
  const grouped={blocked:[],in_progress:[],tbd:[],pending:[],review:[]};
  tasks.forEach(t=>{const s=sectionFor(t.status);if(s)grouped[s].push(t);});
  const meta=HEALTH_META[health.health||""];

  // Health popup
  const[showHealthPicker,setShowHealthPicker]=useState(false);
  const healthRef=useRef(null);
  useEffect(()=>{
    if(!showHealthPicker) return;
    function onDoc(e){if(healthRef.current&&!healthRef.current.contains(e.target))setShowHealthPicker(false);}
    document.addEventListener("mousedown",onDoc);
    return ()=>document.removeEventListener("mousedown",onDoc);
  },[showHealthPicker]);

  return(
    <div className="flex-shrink-0 bg-gray-950/40 border border-gray-800 rounded-xl flex flex-col" style={{width:300}}>
      {/* Header: workstream name + RAG */}
      <div className="px-3 py-2.5 border-b border-gray-800">
        <div className="flex items-center gap-2 mb-2">
          <div className={"w-3 h-3 rounded-full flex-shrink-0 "+ws.dot}/>
          <span className="font-semibold text-gray-200 text-sm flex-1 truncate" title={ws.name}>{ws.name}</span>
          {/* Clickable RAG pill — opens picker above it */}
          <div className="relative" ref={healthRef}>
            <button onClick={()=>setShowHealthPicker(s=>!s)}
              className="flex items-center gap-1.5 px-2 py-1 rounded-lg text-xs hover:opacity-90 transition-all"
              style={{background:meta.bg,border:"1px solid "+meta.border,color:meta.dot==="#6b7280"?"#9ca3af":meta.dot}}
              title="Click to set workstream health">
              <div className="w-2 h-2 rounded-full" style={{background:meta.dot}}/>
              <span className="font-medium">{meta.label}</span>
            </button>
            {showHealthPicker&&<div className="absolute right-0 z-30 mb-1 bg-gray-800 border border-gray-700 rounded-xl shadow-xl p-2" style={{bottom:"100%",minWidth:160}}>
              <p className="text-xs text-gray-500 mb-1.5 px-1">Set health</p>
              <div className="flex flex-col gap-1">
                {["green","amber","red",""].map(h=>{const m=HEALTH_META[h];return(
                  <button key={h||"none"} onClick={()=>{onHealthChange({health:h});setShowHealthPicker(false);}}
                    className="flex items-center gap-2 px-2 py-1.5 rounded-lg text-xs hover:bg-gray-700/60 text-left"
                    style={{color:h&&m.dot!=="#6b7280"?m.dot:"#9ca3af"}}>
                    <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:m.dot}}/>
                    <span>{h?m.label:"None"}</span>
                    {(health.health||"")===h&&<span className="ml-auto text-indigo-400">✓</span>}
                  </button>
                );})}
              </div>
            </div>}
          </div>
        </div>
        {/* Status note — ALWAYS visible textarea */}
        <textarea
          value={health.status||""}
          onChange={e=>onHealthChange({status:e.target.value})}
          placeholder="What's going on this week?"
          className="w-full bg-gray-900/60 border border-gray-800 rounded-lg px-2 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-indigo-500 resize-y leading-relaxed"
          style={{minHeight:48}}/>
        {/* Linked agenda items (parsed by workstream-name match) */}
        {agendaItems.length>0&&<div className="mt-2 pt-2 border-t border-gray-800/60">
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-xs">📋</span>
            <span className="text-xs text-indigo-400 font-medium uppercase tracking-wide">Agenda</span>
            <span className="text-xs text-gray-600">{agendaItems.length}</span>
          </div>
          <div className="space-y-0.5">
            {agendaItems.slice(0,5).map((line,i)=>(
              <div key={i} className="text-xs text-indigo-200/80 leading-relaxed pl-1 truncate" title={line}>{line}</div>
            ))}
            {agendaItems.length>5&&<div className="text-xs text-gray-600 italic">+{agendaItems.length-5} more</div>}
          </div>
        </div>}
      </div>

      {/* Status sections — stacked vertically: blocked → in_progress → tbd → pending → review */}
      <div className="p-2 space-y-2 flex-1">
        {SECTION_ORDER.map(secKey=>{
          const items=grouped[secKey];
          const m=SECTION_META[secKey];
          const isDropTarget=drag&&drag.taskId;
          return(
            <div key={secKey}
              className={"rounded-lg border "+m.border+" "+m.bg+" transition-all "+(isDropTarget?"ring-1 ring-indigo-500/40":"")}
              onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";}}
              onDrop={e=>{
                e.preventDefault();
                if(drag&&drag.taskId&&drag.fromSection!==secKey){
                  moveTaskToSection(drag.taskId,secKey);
                }
                setDrag(null);
              }}>
              <div className="flex items-center gap-1.5 px-2 py-1.5 border-b border-gray-800/60">
                <span className="text-xs">{m.icon}</span>
                <span className={"text-xs font-semibold uppercase tracking-wide flex-1 "+m.color}>{m.label}</span>
                <span className="text-xs text-gray-600 bg-gray-800/80 px-1.5 py-0.5 rounded">{items.length}</span>
              </div>
              <div className="p-1.5 space-y-1 min-h-[40px]">
                {items.length===0
                  ?<p className="text-xs text-gray-700 italic px-1.5 py-1">{drag&&drag.taskId?"Drop here":"—"}</p>
                  :items.map(t=>(
                    <div key={t.id}
                      draggable
                      onDragStart={e=>{setDrag({taskId:t.id,fromSection:secKey});e.dataTransfer.effectAllowed="move";}}
                      onDragEnd={()=>setDrag(null)}
                      className={"cursor-grab active:cursor-grabbing "+(drag&&drag.taskId===t.id?"opacity-40":"")}>
                      <TaskRow t={t} getMember={getMember} jumpToTask={jumpToTask} openEdit={openEdit} setTasks={setTasks} meetingDateKey={meetingDateKey} meetingMode={meetingMode}/>
                    </div>
                  ))
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TaskRow({t,getMember,jumpToTask,openEdit,setTasks,meetingDateKey,meetingMode}){
  const[showNote,setShowNote]=useState(false);
  const meetingNotes=t.meetingNotes||[];
  const noteForThisMeeting=meetingNotes.find(n=>n.date===meetingDateKey);
  const latestNote=noteForThisMeeting||meetingNotes[0]||null;
  const[draft,setDraft]=useState(noteForThisMeeting?noteForThisMeeting.text:"");
  // Re-sync if the underlying task notes change externally
  useEffect(()=>{if(!showNote)setDraft(noteForThisMeeting?noteForThisMeeting.text:"");},[noteForThisMeeting&&noteForThisMeeting.text,showNote]);
  const mb=getMember(t.assignee);
  const pri=PRIORITY_STYLE[t.priority||"N/A"];
  function saveNote(text){
    setDraft(text);
    setTasks(ts=>ts.map(x=>{
      if(x.id!==t.id)return x;
      const existing=(x.meetingNotes||[]).filter(n=>n.date!==meetingDateKey);
      const newNotes=text.trim()?[{date:meetingDateKey,text:text,savedAt:new Date().toISOString()},...existing]:existing;
      // Cap at 20 most recent meeting notes; older ones get appended to task.notes for permanence
      const MAX_NOTES=20;
      let newTaskNotes=x.notes||"";
      let kept=newNotes;
      if(newNotes.length>MAX_NOTES){
        const archived=newNotes.slice(MAX_NOTES);
        const archivedText=archived.map(n=>"[archived note from "+n.date+"]: "+n.text).join("\n");
        newTaskNotes=(newTaskNotes?newTaskNotes+"\n\n":"")+archivedText;
        kept=newNotes.slice(0,MAX_NOTES);
      }
      return Object.assign({},x,{meetingNotes:kept,notes:newTaskNotes,lastModified:new Date().toISOString()});
    }));
  }
  // In meeting mode the textarea is always visible and larger
  const showTextarea = meetingMode || showNote;
  const textareaMinHeight = meetingMode ? 90 : 60;
  // Click anywhere on the row (except the action buttons / textarea) opens edit modal
  function rowClick(){if(openEdit) openEdit(t); else if(jumpToTask) jumpToTask(t.id);}
  return(
    <div className={"bg-gray-800/40 border rounded-lg overflow-hidden "+(meetingMode?"border-indigo-800/40":"border-gray-800")}>
      <div className="flex items-center gap-2 px-3 py-2">
        {/* Priority dot — colour matches existing priority colour scheme */}
        <span className={"w-2.5 h-2.5 rounded-full flex-shrink-0 ring-2 "+pri.dot+" "+pri.dotRing} title={"Priority: "+(t.priority||"N/A")}/>
        <span className="flex-1 text-sm text-gray-200 truncate cursor-pointer hover:text-white" onClick={rowClick} title="Click to edit task">{t.name}</span>
        {mb&&<span className={"text-xs px-1.5 py-0.5 rounded "+mb.bg+" "+(mb.text||"text-white")} title={t.assignee}>{(t.assignee||"").split(" ").map(p=>p[0]).join("").slice(0,2)}</span>}
        {t.deadline&&<span className="text-xs text-gray-500">{t.deadline.slice(5)}</span>}
        {!meetingMode&&<button onClick={e=>{e.stopPropagation();setShowNote(s=>!s);}} aria-label={showNote?"Hide note":"Add meeting note"} title="Add meeting note" className={"text-xs px-2 py-0.5 rounded "+(latestNote?"bg-indigo-900/50 text-indigo-300":"bg-gray-700 text-gray-400 hover:text-indigo-300")}>
          {meetingNotes.length>0?"💬 "+meetingNotes.length:"+ note"}
        </button>}
        {meetingMode&&meetingNotes.length>0&&<span className="text-xs px-2 py-0.5 rounded bg-indigo-900/50 text-indigo-300" title={meetingNotes.length+" past notes"}>💬 {meetingNotes.length}</span>}
      </div>
      {latestNote&&!showTextarea&&<div className="px-3 pb-2 -mt-1 ml-1 cursor-pointer" onClick={rowClick}>
        <p className="text-xs text-indigo-300/80 italic leading-relaxed">"{latestNote.text}" <span className="text-gray-600 not-italic">— {fmtMeetingShort(latestNote.date)}</span></p>
      </div>}
      {showTextarea&&<div className={"px-3 pb-3 border-t pt-2.5 "+(meetingMode?"bg-indigo-950/20 border-indigo-900/40":"bg-gray-900/40 border-gray-800")} onClick={e=>e.stopPropagation()}>
        <textarea value={draft} onChange={e=>saveNote(e.target.value)}
          placeholder={meetingMode?"Notes for this meeting — auto-saves to the task":"Discussion note for this meeting (auto-saves)..."}
          aria-label={"Meeting note for "+t.name}
          className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y leading-relaxed" style={{minHeight:textareaMinHeight}}/>
        {meetingNotes.length>1&&<details className="mt-2"><summary className="text-xs text-gray-500 cursor-pointer hover:text-gray-400">Past notes ({meetingNotes.length-(noteForThisMeeting?1:0)})</summary>
          <div className="mt-1.5 space-y-1.5">{meetingNotes.filter(n=>n.date!==meetingDateKey).slice(0,5).map((n,i)=><div key={i} className="text-xs text-gray-500 italic border-l-2 border-gray-700 pl-2">"{n.text}" <span className="text-gray-600 not-italic">— {fmtMeetingShort(n.date)}</span></div>)}</div>
        </details>}
      </div>}
    </div>
  );
}


// ── AgendaPanel: agenda for a date the user can change (defaults to next meeting) ─
function AgendaPanel({nextMeeting,agendaText,setAgendaText,agendaStructure,agendaHistory,setAgendaHistory,saveAgenda,saving,saved,handleChange,setSaved,fmtMeetingDate,scheduledMeetings,setMeetingSchedule,meetingSchedule}){
  const todayStr=fmtDate(new Date());
  // Selected date defaults to nextMeeting.date, but user can change it
  const[selectedDate,setSelectedDate]=useState(nextMeeting?nextMeeting.date:fmtDate(getNextThursday(new Date())));
  // When the next meeting changes (e.g. after a save), keep selectedDate aligned unless user overrode
  const[userPicked,setUserPicked]=useState(false);
  useEffect(()=>{if(!userPicked&&nextMeeting)setSelectedDate(nextMeeting.date);},[nextMeeting&&nextMeeting.date,userPicked]);

  // Find the agenda text for the selected date — from history or current editor state
  const isCurrentDate=nextMeeting&&selectedDate===nextMeeting.date;
  const histEntry=agendaHistory.find(h=>h.date===selectedDate);

  // The text displayed in the textarea
  const displayText=isCurrentDate?agendaText:(histEntry?histEntry.text:"");

  // List of all dates with content (history) plus future scheduled meetings
  const allDates=Array.from(new Set([
    ...scheduledMeetings.filter(m=>!m.cancelled).map(m=>m.date),
    ...agendaHistory.map(h=>h.date),
  ])).sort();

  function pickDate(d){setSelectedDate(d);setUserPicked(true);}

  // For non-current dates, allow editing the history entry directly
  const[draftHistText,setDraftHistText]=useState("");
  useEffect(()=>{if(!isCurrentDate)setDraftHistText(histEntry?histEntry.text:"");},[selectedDate,histEntry&&histEntry.text,isCurrentDate]);
  function saveDraftHist(text){
    setDraftHistText(text);
    setAgendaHistory(h=>{
      const filtered=h.filter(x=>x.date!==selectedDate);
      if(!text.trim())return filtered;
      return [{date:selectedDate,label:"",savedAt:new Date().toISOString(),text},...filtered].slice(0,52);
    });
  }

  // Add a one-off meeting for the picked date if user types one in
  const[customDate,setCustomDate]=useState("");
  function pickCustom(){
    if(!customDate)return;
    pickDate(customDate);
    if(!scheduledMeetings.find(m=>m.date===customDate)){
      setMeetingSchedule(s=>[...s,{id:uid("mtg"),date:customDate,oneOff:true,cancelled:false,label:""}]);
    }
    setCustomDate("");
  }

  // ── Side-by-side comparison ─────────────────────────────────────────────
  // Find the previous (most recent past) agenda relative to selectedDate
  const previousEntry=(()=>{
    const earlier=agendaHistory.filter(h=>h.date<selectedDate&&h.text&&h.text.trim()).sort((a,b)=>b.date.localeCompare(a.date));
    return earlier[0]||null;
  })();
  const[compareMode,setCompareMode]=useState(false);
  // Auto-enable compare mode when on current date and a previous agenda exists
  useEffect(()=>{
    if(isCurrentDate&&previousEntry&&!userPicked) setCompareMode(true);
  },[isCurrentDate,previousEntry&&previousEntry.date]);

  // Carry-forward: append a single line to the active editor
  function appendLine(line){
    if(!line||!line.trim()) return;
    if(isCurrentDate){
      const cur=agendaText||"";
      const sep=cur&&!cur.endsWith("\n")?"\n":"";
      handleChange(cur+sep+line);
    }else{
      const cur=draftHistText||"";
      const sep=cur&&!cur.endsWith("\n")?"\n":"";
      saveDraftHist(cur+sep+line);
    }
  }
  function copyAllUnticked(){
    if(!previousEntry) return;
    const lines=(previousEntry.text||"").split(/\r?\n/);
    // Skip lines that look already complete (tick mark, [x], strikethrough markers)
    const carryable=lines.filter(l=>{
      const t=l.trim();
      if(!t) return false;
      if(/^[✓✔☑]/.test(t)) return false;
      if(/\[x\]/i.test(t)) return false;
      return true;
    });
    if(!carryable.length) return;
    const block=carryable.join("\n");
    if(isCurrentDate){
      const cur=agendaText||"";
      const sep=cur&&!cur.endsWith("\n")?"\n":"";
      handleChange(cur+sep+block);
    }else{
      const cur=draftHistText||"";
      const sep=cur&&!cur.endsWith("\n")?"\n":"";
      saveDraftHist(cur+sep+block);
    }
  }

  return(
    <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4">
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800 flex-wrap gap-2">
        <div className="flex items-center gap-2 flex-wrap">
          <div className="w-2 h-2 rounded-full bg-indigo-400 flex-shrink-0"/>
          <span className="font-semibold text-gray-200">Agenda</span>
          <span className="text-xs text-gray-500">— viewing {fmtMeetingDate(selectedDate)}</span>
          {!isCurrentDate&&<span className="text-xs text-amber-400">past/other meeting</span>}
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {previousEntry&&<button onClick={()=>setCompareMode(c=>!c)}
            className={"text-xs px-2.5 py-1.5 rounded-lg "+(compareMode?"bg-indigo-600 text-white":"bg-gray-800 text-gray-300 hover:bg-gray-700")}
            title="Show last meeting alongside this one">
            {compareMode?"⇄ Comparing":"⇄ Compare"}
          </button>}
          <select value={selectedDate} onChange={e=>pickDate(e.target.value)} className="text-xs bg-gray-800 border border-gray-700 rounded-lg px-2 py-1.5 text-gray-200 focus:outline-none focus:border-indigo-500">
            {allDates.map(d=><option key={d} value={d}>{fmtMeetingDate(d)}{nextMeeting&&d===nextMeeting.date?" (next)":""}</option>)}
          </select>
          <input type="date" value={customDate} onChange={e=>setCustomDate(e.target.value)} className="text-xs bg-gray-800 border border-gray-700 rounded-lg px-2 py-1 text-gray-200 focus:outline-none focus:border-indigo-500" title="Pick any date"/>
          {customDate&&<button onClick={pickCustom} className="text-xs bg-indigo-600 hover:bg-indigo-500 px-2 py-1 rounded-lg text-white">Go</button>}
          {isCurrentDate&&<>
            <button onClick={()=>{setAgendaText((agendaStructure&&agendaStructure.trim())?agendaStructure.trim():DEFAULT_AGENDA_STRUCTURE);setSaved(false);}} className="text-xs bg-indigo-700 hover:bg-indigo-600 px-3 py-1.5 rounded-lg text-indigo-100">📋 Template</button>
            <button onClick={()=>{setAgendaText("");setSaved(false);}} className="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-gray-400">Clear</button>
            <button onClick={saveAgenda} disabled={saving||!agendaText||!agendaText.trim()} className={"text-xs px-3 py-1.5 rounded-lg font-medium "+(saved?"bg-green-700 text-white":"bg-indigo-600 hover:bg-indigo-500 text-white disabled:opacity-50")}>{saving?"Saving...":saved?"✓ Saved":"Save agenda"}</button>
          </>}
        </div>
      </div>
      <div className="p-4">
        {compareMode&&previousEntry
          ? <AgendaCompare
              previousEntry={previousEntry}
              isCurrentDate={isCurrentDate}
              activeText={isCurrentDate?agendaText:draftHistText}
              onChangeActive={isCurrentDate?handleChange:saveDraftHist}
              onAppendLine={appendLine}
              onCopyAll={copyAllUnticked}
              fmtMeetingDate={fmtMeetingDate}
              selectedDate={selectedDate}/>
          : (isCurrentDate
              ?<textarea value={agendaText} onChange={e=>handleChange(e.target.value)} placeholder="Write the agenda for this meeting..." className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y" style={{minHeight:200,lineHeight:"1.6"}}/>
              :<textarea value={draftHistText} onChange={e=>saveDraftHist(e.target.value)} placeholder="No agenda saved for this date — type to create one. Auto-saves." className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-amber-500 resize-y" style={{minHeight:200,lineHeight:"1.6"}}/>
            )
        }
        {(displayText||draftHistText)&&<div className="flex items-center gap-2 mt-2 justify-between flex-wrap">
          <span className="text-xs text-gray-500">{isCurrentDate?"":"Auto-saving to history."}</span>
          <button onClick={()=>{const text=isCurrentDate?agendaText:draftHistText;const el=document.createElement("textarea");el.value=text;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);}} className="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg text-gray-400">Copy</button>
        </div>}
      </div>
    </div>
  );
}

// ── AgendaCompare: side-by-side previous (left, read-only) vs current (right, editable) ──
function AgendaCompare({previousEntry,isCurrentDate,activeText,onChangeActive,onAppendLine,onCopyAll,fmtMeetingDate,selectedDate}){
  // Track which lines from the previous agenda have been carried over
  const[carried,setCarried]=useState(new Set());
  // If active text already contains a previous line, mark it carried
  const prevLines=(previousEntry.text||"").split(/\r?\n/);
  const activeNorm=(activeText||"").toLowerCase();
  function isAlreadyIn(line){
    const t=line.trim();
    if(!t) return false;
    return activeNorm.includes(t.toLowerCase());
  }
  function carry(idx,line){
    onAppendLine(line);
    setCarried(prev=>{const n=new Set(prev);n.add(idx);return n;});
  }
  return(
    <div>
      <div className="flex items-center justify-between mb-2">
        <p className="text-xs text-gray-500">Click <span className="text-indigo-400 font-medium">→</span> to copy a line from last meeting into this one. Items already in the new agenda are dimmed.</p>
        <button onClick={onCopyAll} className="text-xs bg-indigo-700 hover:bg-indigo-600 px-2.5 py-1 rounded-lg text-indigo-100" title="Copy all lines that don't look already done">
          ⇒ Copy all unfinished
        </button>
      </div>
      <div className="grid gap-3" style={{gridTemplateColumns:"1fr auto 1fr"}}>
        {/* LEFT: previous agenda, read-only with per-line copy buttons */}
        <div className="bg-gray-900/60 border border-gray-800 rounded-lg overflow-hidden">
          <div className="px-3 py-2 border-b border-gray-800 bg-gray-900/80 flex items-center gap-2">
            <span className="text-xs text-gray-400 font-semibold uppercase tracking-wide">Last meeting</span>
            <span className="text-xs text-gray-600">{fmtMeetingDate(previousEntry.date)}</span>
          </div>
          <div className="p-2 max-h-[420px] overflow-y-auto">
            {prevLines.length===0||(prevLines.length===1&&!prevLines[0].trim())
              ?<p className="text-xs text-gray-600 italic px-2 py-2">Last meeting's agenda was empty.</p>
              :prevLines.map((line,i)=>{
                const empty=!line.trim();
                if(empty) return <div key={i} style={{height:8}}/>;
                const done=carried.has(i)||isAlreadyIn(line);
                return(
                  <div key={i} className={"flex items-start gap-2 px-2 py-1 rounded hover:bg-gray-800/50 group "+(done?"opacity-40":"")}>
                    <span className="text-xs text-gray-300 leading-relaxed flex-1 whitespace-pre-wrap">{line}</span>
                    {!done&&<button onClick={()=>carry(i,line)} title="Copy this line into the new agenda" className="opacity-0 group-hover:opacity-100 transition-opacity text-xs px-1.5 py-0.5 rounded bg-indigo-700 hover:bg-indigo-600 text-indigo-100 flex-shrink-0">→</button>}
                    {done&&<span className="text-xs text-green-500 flex-shrink-0">✓</span>}
                  </div>
                );
              })
            }
          </div>
        </div>
        {/* DIVIDER ARROW */}
        <div className="flex items-center justify-center text-gray-600 text-xl select-none">⇄</div>
        {/* RIGHT: live editable agenda for selected date */}
        <div className="bg-gray-800/40 border border-indigo-800/40 rounded-lg overflow-hidden">
          <div className="px-3 py-2 border-b border-indigo-900/40 bg-indigo-950/30 flex items-center gap-2">
            <span className="text-xs text-indigo-300 font-semibold uppercase tracking-wide">{isCurrentDate?"Next meeting":"This meeting"}</span>
            <span className="text-xs text-gray-500">{fmtMeetingDate(selectedDate)}</span>
          </div>
          <textarea
            value={activeText||""}
            onChange={e=>onChangeActive(e.target.value)}
            placeholder="Write the new agenda — or use → to carry items forward from the left."
            className="w-full bg-transparent border-0 px-3 py-2 text-sm text-gray-200 focus:outline-none resize-y leading-relaxed"
            style={{minHeight:380,maxHeight:420}}/>
        </div>
      </div>
    </div>
  );
}

function fmtMeetingShort(ds){const d=parseDate(ds);if(!d)return ds;return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});}

// ── MeetingDecisions: log a decision in-meeting, tagged with meeting date ────
function MeetingDecisions({decisions,setDecisions,members,workstreams,nextMeeting,addLog,meetingMode,meetingAttendees}){
  const confirmAsync=useConfirm();
  const toast=useToast();
  const meetingDateKey=nextMeeting?nextMeeting.date:fmtDate(getNextThursday(new Date()));
  const meetingLabel=nextMeeting?nextMeeting.label:"";
  // Decisions tagged with this meeting's date
  const decisionsThisMeeting=decisions.filter(d=>d.meetingDate===meetingDateKey);
  const[showForm,setShowForm]=useState(false);
  const[text,setText]=useState("");
  const[madeBy,setMadeBy]=useState(members[0]?.name||"");
  const[workstream,setWorkstream]=useState("");
  const[notes,setNotes]=useState("");
  function submit(){
    if(!text.trim())return;
    const dec={
      id:uid("dec"),text:text.trim(),madeBy,workstream,epic:"",notes,
      date:fmtDate(new Date()),
      meetingDate:meetingDateKey,
      meetingLabel:meetingLabel||"",
      attendees:meetingMode?meetingAttendees:[]
    };
    setDecisions(d=>[dec,...d]);
    addLog("decision","Decision (meeting): "+text.slice(0,60));
    toast("Decision logged","success");
    setText("");setNotes("");setWorkstream("");
    if(!meetingMode)setShowForm(false);
  }
  async function removeDecision(id){
    const ok=await confirmAsync({title:"Remove decision?",message:"This will remove the decision from the log.",confirmLabel:"Remove",danger:true});
    if(!ok)return;
    setDecisions(d=>d.filter(x=>x.id!==id));
    toast("Decision removed","success");
  }
  return(
    <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4">
      <div className="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-amber-400"/>
          <span className="font-semibold text-gray-200">Decisions This Meeting</span>
          <span className="text-xs text-gray-500">{decisionsThisMeeting.length}</span>
        </div>
        {!meetingMode&&<button onClick={()=>setShowForm(s=>!s)} className="text-xs bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-white font-medium">
          {showForm?"Cancel":"+ Log decision"}
        </button>}
      </div>
      {(showForm||meetingMode)&&<div className="p-4 border-b border-gray-800 space-y-3 bg-gray-950/40">
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="What was decided?" className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y" style={{minHeight:60}}/>
        <div className="grid grid-cols-2 gap-2">
          <select value={madeBy} onChange={e=>setMadeBy(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-2 py-1.5 text-sm text-gray-200 focus:outline-none">
            {members.filter(m=>m.name!=="Unassigned").map(m=><option key={m.id}>{m.name}</option>)}
          </select>
          <select value={workstream} onChange={e=>setWorkstream(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-2 py-1.5 text-sm text-gray-200 focus:outline-none">
            <option value="">— Workstream —</option>
            {workstreams.map(w=><option key={w.id}>{w.name}</option>)}
          </select>
        </div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Rationale (optional)" className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y" style={{minHeight:40}}/>
        <div className="flex justify-end gap-2">
          {meetingMode&&<button onClick={()=>{setText("");setNotes("");setWorkstream("");}} disabled={!text.trim()&&!notes.trim()} className="text-xs bg-gray-700 hover:bg-gray-600 disabled:opacity-40 px-3 py-1.5 rounded-lg text-gray-300">Clear</button>}
          <button onClick={submit} disabled={!text.trim()} className="text-xs bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 px-4 py-1.5 rounded-lg text-white font-medium">{meetingMode?"Log decision":"Save"}</button>
        </div>
      </div>}
      <div className="divide-y divide-gray-800">
        {decisionsThisMeeting.length===0&&!showForm&&<p className="text-xs text-gray-600 px-4 py-3">No decisions logged for this meeting yet.</p>}
        {decisionsThisMeeting.map(d=>(
          <div key={d.id} className="px-4 py-3">
            <div className="flex items-start gap-2">
              <p className="text-sm text-gray-200 flex-1">{d.text}</p>
              <button onClick={()=>removeDecision(d.id)} className="text-xs text-gray-600 hover:text-red-400">✕</button>
            </div>
            <div className="flex items-center gap-2 mt-1 flex-wrap">
              <span className="text-xs text-gray-500">{d.madeBy}</span>
              {d.workstream&&<span className="text-xs text-indigo-400">{d.workstream}</span>}
            </div>
            {d.notes&&<p className="text-xs text-gray-500 italic mt-1">{d.notes}</p>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DECISION TRACKER ──────────────────────────────────────────────────────────
function DecisionTracker({decisions,setDecisions,members,workstreams,epics,meetingMode,meetingAttendees,addLog}){
  const[showForm,setShowForm]=useState(false);

      {meetingMode&&<div className="bg-indigo-900/40 border border-indigo-700 rounded-xl px-4 py-2 mb-4 text-sm text-indigo-200 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-400 animate-pulse"/><span>Meeting Mode ON — attendees: {meetingAttendees.join(", ")||"none"}</span></div>}
      {showForm&&<div className="bg-gray-900 border border-gray-700 rounded-xl p-5 mb-5"><h3 className="font-semibold mb-4 text-gray-200">Log a Decision</h3><div className="space-y-3">
        <div><label className="text-xs text-gray-400 block mb-1">Decision</label><textarea value={form.text} onChange={e=>setForm(f=>Object.assign({},f,{text:e.target.value}))} placeholder="Describe the decision..." className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none h-20 resize-none"/></div>
        <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-gray-400 block mb-1">Made By</label><select value={form.madeBy} onChange={e=>setForm(f=>Object.assign({},f,{madeBy:e.target.value}))} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none">{members.filter(m=>m.name!=="Unassigned").map(m=><option key={m.id}>{m.name}</option>)}</select></div><div><label className="text-xs text-gray-400 block mb-1">Date</label><input type="date" value={form.date} onChange={e=>setForm(f=>Object.assign({},f,{date:e.target.value}))} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none"/></div></div>
        <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-gray-400 block mb-1">Workstream</label><select value={form.workstream} onChange={e=>setForm(f=>Object.assign({},f,{workstream:e.target.value}))} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none"><option value="">— None —</option>{workstreams.map(w=><option key={w.id}>{w.name}</option>)}</select></div><div><label className="text-xs text-gray-400 block mb-1">Epic</label><select value={form.epic} onChange={e=>setForm(f=>Object.assign({},f,{epic:e.target.value}))} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none"><option value="">— None —</option>{epics.map((ep,i)=><option key={i}>{ep}</option>)}</select></div></div>
        <div><label className="text-xs text-gray-400 block mb-1">Notes / Rationale</label><textarea value={form.notes} onChange={e=>setForm(f=>Object.assign({},f,{notes:e.target.value}))} placeholder="Why was this decision made?" className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none h-16 resize-none"/></div>
        <div className="flex gap-2 justify-end"><button onClick={()=>{setShowForm(false);setForm(blank);}} className="px-4 py-2 bg-gray-800 rounded-lg text-sm">Cancel</button><button onClick={submit} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium">Save</button></div>
      </div></div>}
      <div className="flex gap-2 mb-4 flex-wrap">{wsWithDec.map(w=><button key={w} onClick={()=>setFilter(w)} className={"px-3 py-1 rounded text-sm "+(filter===w?"bg-indigo-600 text-white":"bg-gray-800 text-gray-400 hover:text-white")}>{w}</button>)}</div>
      <div className="space-y-3">{filtered.length===0&&<p className="text-gray-500 text-sm">No decisions logged yet.</p>}{filtered.map(d=>{const mb=members.find(m=>m.name===d.madeBy)||{name:d.madeBy,bg:"bg-slate-600",text:"text-slate-100"};return <div key={d.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4"><div className="flex items-start justify-between gap-4 mb-2"><p className="text-gray-100 font-medium text-sm flex-1">{d.text}</p><span className="text-xs text-gray-500 flex-shrink-0">{d.date}</span></div><div className="flex items-center gap-3 flex-wrap"><div className="flex items-center gap-1.5"><Avatar member={mb}/><span className="text-xs text-gray-400">{d.madeBy}</span></div>{d.workstream&&<span className="text-xs text-indigo-300 bg-indigo-900/40 px-2 py-0.5 rounded">{d.workstream}</span>}{d.attendees&&d.attendees.length>0&&<span className="text-xs text-gray-500">Present: {d.attendees.join(", ")}</span>}</div>{d.notes&&<p className="text-xs text-gray-500 mt-2 italic">{d.notes}</p>}</div>;})} </div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function SettingsPanel({workstreams,setWorkstreams,statuses,setStatuses,members,setMembers,epics,setEpics,activityLog,gsUrl,setGsUrl,gsConnected,gsError,onConnect,onPush,onPull,taskDefaults,setTaskDefaults,initialTab,onTabChange,healthProps,theme,setTheme,agendaStructure,setAgendaStructure}){

  const[statusDragOver,setStatusDragOver]=useState(null);
  const[openColorPicker,setOpenColorPicker]=useState(null);

  React.useEffect(()=>{if(initialTab&&initialTab!==sTab&&STABS_DATA.find(t=>t.id===initialTab)){setSTab(initialTab);}},[initialTab]);
  const[sEditMode,setSEditMode]=useState(false);

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function Timeline({tasks,setTasks,workstreams,members,filterMember}){
  const[tooltip,setTooltip]=useState(null);
  const[dragState,setDragState]=useState(null);
  const getWS=name=>workstreams.find(w=>w.name===name)||{color:"bg-gray-700",dot:"bg-gray-500"};
  const getMbr=name=>members.find(m=>m.name===name)||{name:"?",bg:"bg-slate-600",text:"text-slate-100"};
  const vis=tasks.filter(t=>
    (filterMember==="All"||t.assignee===filterMember)&&
    t.start
  );
  const dates=vis.flatMap(t=>[parseDate(t.start),parseDate(t.deadline)]).filter(Boolean);
  if(dates.length===0)return <div className="flex items-center justify-center h-64 text-gray-500 bg-gray-900 rounded-xl border border-gray-800"><div className="text-center"><div className="text-4xl mb-2">📅</div><div>No tasks have dates yet.</div></div></div>;
  const minDate=new Date(Math.min(...dates.map(d=>d.getTime())));
  const maxDate=new Date(Math.max(...dates.map(d=>d.getTime())));
  const tlStart=addDays(minDate,-7);const tlEnd=addDays(maxDate,14);
  const totalDays=diffDays(tlStart,tlEnd)||1;const totalPx=totalDays*DAY_PX;
  const mondays=getMondaysInRange(tlStart,tlEnd);
  const todayPx=diffDays(tlStart,new Date())*DAY_PX;
  function px4d(d){return diffDays(tlStart,d)*DAY_PX;}
  function startDrag(e,taskId,mode){
    e.preventDefault();const sx=e.clientX;
    const task=tasks.find(t=>t.id===taskId);
    const os=parseDate(task.start);const oe=parseDate(task.deadline)||parseDate(task.start);
    setDragState({taskId,mode});
    function onMove(ev){const dx=ev.clientX-sx;const dd=Math.round(dx/DAY_PX);let ns=os,ne=oe;if(mode==="move"){ns=addDays(os,dd);ne=addDays(oe,dd);}else if(mode==="left"){ns=addDays(os,dd);if(ns>ne)ns=ne;}else if(mode==="right"){ne=addDays(oe,dd);if(ne<ns)ne=ns;}setTooltip({x:ev.clientX,y:ev.clientY,text:(mode==="right"?"End: ":"Start: ")+fmtDisplay(mode==="right"?ne:ns)});setTasks(ts=>ts.map(t=>t.id===taskId?Object.assign({},t,{start:fmtDate(ns),deadline:fmtDate(ne)}):t));}
    function onUp(){setDragState(null);setTooltip(null);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
  }
  return(
    <div className="relative">
      <div className="overflow-x-auto overflow-y-auto rounded-xl border border-gray-800 bg-gray-900" style={{maxHeight:"70vh"}}>
        <div style={{width:LABEL_W+totalPx,minWidth:"100%"}}>
          <div className="flex sticky top-0 z-20 bg-gray-950 border-b border-gray-800" style={{height:40}}>
            <div className="flex-shrink-0 border-r border-gray-800 flex items-center px-3" style={{width:LABEL_W}}><span className="text-xs text-gray-500">Task</span></div>
            <div className="relative" style={{width:totalPx,height:40}}>
              {Array.from({length:totalDays},(_,i)=><div key={i} style={{position:"absolute",top:0,bottom:0,left:i*DAY_PX,width:DAY_PX,borderRight:"1px solid rgba(255,255,255,0.03)"}}/>)}
              {mondays.map((d,i)=>{const x=px4d(d);return <div key={i} style={{position:"absolute",left:x,top:0,height:40,display:"flex",alignItems:"center"}}><div style={{position:"absolute",top:0,bottom:0,left:0,borderLeft:"1px solid rgba(255,255,255,0.15)"}}/><span className="text-xs text-gray-400 whitespace-nowrap" style={{paddingLeft:4,position:"relative"}}>{d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span></div>;})}
              <div style={{position:"absolute",top:0,bottom:0,left:todayPx,width:2,background:"#6366f1",opacity:0.8}}/>
            </div>
          </div>
          {vis.map((t,ri)=>{
            const ws=getWS(t.workstream);const mb=getMbr(t.assignee);const sd=parseDate(t.start);const ed=parseDate(t.deadline)||parseDate(t.start);if(!sd)return null;
            const bl=px4d(sd);const bw=Math.max(DAY_PX,(diffDays(sd,ed)+1)*DAY_PX);const ia=dragState&&dragState.taskId===t.id;
            const pri=PRIORITY_STYLE[t.priority||"N/A"];const rb=document.documentElement.getAttribute("data-theme")==="light"?(ri%2===0?"#f8fafc":"#f1f5f9"):(ri%2===0?"#111827":"#0f172a");
            const isComplete=t.status==="Complete"||t.status==="Complete - RR"||t.status==="Archived"||t.status==="Archive - Complete";
            return(
              <div key={t.id} className={"flex border-b border-gray-800 "+(isComplete?"opacity-40":"")} style={{height:ROW_H,background:rb}}>
                <div className="flex-shrink-0 border-r border-gray-800 flex items-center gap-2 px-3 overflow-hidden" style={{width:LABEL_W}}><Avatar member={mb}/><span className={"text-xs truncate "+(isComplete?"line-through text-gray-500":"text-gray-300")}>{t.name}</span>{t.priority&&t.priority!=="N/A"&&!isComplete&&<span className={"text-xs px-1 py-0.5 rounded flex-shrink-0 "+pri.badge}>{t.priority}</span>}</div>
                <div className="relative" style={{width:totalPx,height:ROW_H}}>
                  {Array.from({length:totalDays},(_,i)=><div key={i} style={{position:"absolute",top:0,bottom:0,left:i*DAY_PX,width:DAY_PX,borderRight:"1px solid rgba(255,255,255,0.025)"}}/>)}
                  {mondays.map((d,i)=><div key={i} style={{position:"absolute",top:0,bottom:0,left:px4d(d),borderLeft:"1px solid rgba(255,255,255,0.08)"}}/>)}
                  <div style={{position:"absolute",top:0,bottom:0,left:todayPx,width:1,background:"#6366f1",opacity:0.3}}/>
                  <div className={"absolute rounded select-none "+(isComplete?"bg-gray-600 ":ws.color+" ")+(ia?" ring-2 ring-white opacity-90":" opacity-80 hover:opacity-100")+" flex items-center"} style={Object.assign({left:bl,width:bw,height:22,top:"50%",transform:"translateY(-50%)",cursor:isComplete?"default":"grab",userSelect:"none"},isComplete?{}:wsStyle(ws))} onMouseDown={e=>!isComplete&&startDrag(e,t.id,"move")}>
                    <div className="absolute left-0 top-0 bottom-0 flex items-center justify-center" style={{width:8,cursor:"ew-resize",borderRadius:"4px 0 0 4px"}} onMouseDown={e=>{e.stopPropagation();startDrag(e,t.id,"left");}}><div style={{width:2,height:12,background:"rgba(255,255,255,0.4)",borderRadius:1}}/></div>
                    <span className="text-xs text-white truncate" style={{padding:"0 12px",pointerEvents:"none"}}>{t.name}</span>
                    <div className="absolute right-0 top-0 bottom-0 flex items-center justify-center" style={{width:8,cursor:"ew-resize",borderRadius:"0 4px 4px 0"}} onMouseDown={e=>{e.stopPropagation();startDrag(e,t.id,"right");}}><div style={{width:2,height:12,background:"rgba(255,255,255,0.4)",borderRadius:1}}/></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {tooltip&&<div className="fixed z-50 pointer-events-none bg-gray-900 border border-indigo-500 text-indigo-300 text-xs rounded-lg shadow-xl font-mono" style={{left:tooltip.x+14,top:tooltip.y-10,padding:"4px 10px"}}>{tooltip.text}</div>}
      <div className="flex gap-4 mt-3 flex-wrap items-center"><div className="flex items-center gap-1.5"><div style={{width:12,height:2,background:"#6366f1"}}/><span className="text-xs text-gray-400">Today</span></div>{workstreams.map(ws=><div key={ws.id} className="flex items-center gap-1.5"><div className={"w-3 h-3 rounded "+ws.color}/><span className="text-xs text-gray-400">{ws.name}</span></div>)}</div>
    </div>
  );
}

// ── Focus trap for modals (accessibility) ────────────────────────────────
function useFocusTrap(active){
  const ref=useRef(null);
  useEffect(()=>{
    if(!active||!ref.current)return;
    const node=ref.current;
    const prev=document.activeElement;
    function getFocusable(){
      return Array.from(node.querySelectorAll('a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])')).filter(el=>!el.hasAttribute("disabled")&&el.offsetParent!==null);
    }
    // Focus first focusable element on open
    setTimeout(()=>{const fs=getFocusable();if(fs.length)fs[0].focus();},0);
    function onKey(e){
      if(e.key!=="Tab")return;
      const fs=getFocusable();
      if(!fs.length)return;
      const first=fs[0],last=fs[fs.length-1];
      if(e.shiftKey){
        if(document.activeElement===first){e.preventDefault();last.focus();}
      }else{
        if(document.activeElement===last){e.preventDefault();first.focus();}
      }
    }
    node.addEventListener("keydown",onKey);
    return()=>{
      node.removeEventListener("keydown",onKey);
      if(prev&&prev.focus)try{prev.focus();}catch(e){}
    };
  },[active]);
  return ref;
}


// ── Toast notification system ─────────────────────────────────────────────
const ToastContext = React.createContext(null);
function useToast(){ return React.useContext(ToastContext) || ((m,t)=>console.log("[toast]",t,m)); }
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const idRef=useRef(0);
  const push=React.useCallback((message,type)=>{
    const id=++idRef.current;
    setToasts(t=>[...t,{id,message,type:type||"info"}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), type==="error"?6000:3500);
  },[]);
  const dismiss=React.useCallback(id=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8,maxWidth:420}} aria-live="polite" aria-atomic="true">
        {toasts.map(t=>{
          const colors={
            info:{bg:"#1f2937",border:"#374151",text:"#e5e7eb",icon:"ℹ"},
            success:{bg:"#14532d",border:"#16a34a",text:"#dcfce7",icon:"✓"},
            error:{bg:"#7f1d1d",border:"#dc2626",text:"#fee2e2",icon:"⚠"},
            warning:{bg:"#78350f",border:"#d97706",text:"#fef3c7",icon:"⚠"},
          };
          const c=colors[t.type]||colors.info;
          return (
            <div key={t.id} role="status" style={{background:c.bg,border:"1px solid "+c.border,color:c.text,padding:"10px 14px",borderRadius:10,fontSize:"0.875rem",display:"flex",gap:10,alignItems:"flex-start",boxShadow:"0 8px 24px rgba(0,0,0,0.25)",animation:"toastIn 0.2s ease-out"}}>
              <span style={{fontSize:"1rem",lineHeight:1.2,flexShrink:0}}>{c.icon}</span>
              <span style={{flex:1,lineHeight:1.4}}>{t.message}</span>
              <button onClick={()=>dismiss(t.id)} aria-label="Dismiss notification" style={{background:"transparent",border:"none",color:c.text,cursor:"pointer",opacity:0.6,fontSize:"1rem",padding:0,lineHeight:1}}>×</button>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
}

// ── Confirm dialog system (replaces window.confirm) ──────────────────────
const ConfirmContext = React.createContext(null);
function useConfirm(){
  const ctx = React.useContext(ConfirmContext);
  // Fallback to window.confirm if not in provider (shouldn't happen)
  return ctx || (async (opts)=>window.confirm(typeof opts==="string"?opts:opts.message));
}
function ConfirmProvider({children}){
  const[state,setState]=useState(null); // {title, message, confirmLabel, danger, resolve}
  const confirm=React.useCallback((opts)=>{
    return new Promise(resolve=>{
      const o = typeof opts==="string"?{message:opts}:opts;
      setState({
        title:o.title||"Confirm",
        message:o.message||"Are you sure?",
        confirmLabel:o.confirmLabel||"Confirm",
        cancelLabel:o.cancelLabel||"Cancel",
        danger:o.danger||false,
        resolve,
      });
    });
  },[]);
  function close(answer){
    if(state) state.resolve(answer);
    setState(null);
  }
  // ESC + Enter handling — capture phase so we run before underlying modal escape handlers
  useEffect(()=>{
    if(!state)return;
    function onKey(e){
      if(e.key==="Escape"){e.stopPropagation();e.preventDefault();close(false);}
      if(e.key==="Enter"){e.stopPropagation();e.preventDefault();close(true);}
    }
    document.addEventListener("keydown",onKey,true);
    return ()=>document.removeEventListener("keydown",onKey,true);
  },[state]);
  return (
    <ConfirmContext.Provider value={confirm}>
      {children}
      {state && (
        <div role="dialog" aria-modal="true" aria-labelledby="confirm-title" ref={useFocusTrap(!!state)} onClick={e=>{if(e.target===e.currentTarget)close(false);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10000,padding:"1rem"}}>
          <div style={{background:"var(--bg-card,#fff)",border:"1px solid var(--ls-border,#d4dae8)",borderRadius:12,padding:"20px 22px",maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
            <h3 id="confirm-title" style={{margin:"0 0 8px 0",fontSize:"1.05rem",fontWeight:700,color:"var(--ls-black,#252525)"}}>{state.title}</h3>
            <p style={{margin:"0 0 18px 0",fontSize:"0.9rem",lineHeight:1.5,color:"var(--text-faint,#4a5568)"}}>{state.message}</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
              <button onClick={()=>close(false)} autoFocus style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--ls-border,#d4dae8)",background:"transparent",color:"var(--ls-black,#252525)",fontSize:"0.85rem",cursor:"pointer",fontFamily:"inherit"}}>{state.cancelLabel}</button>
              <button onClick={()=>close(true)} style={{padding:"8px 14px",borderRadius:8,border:"none",background:state.danger?"#dc2626":"var(--ls-blue,#0036db)",color:"#ffffff",fontSize:"0.85rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{state.confirmLabel}</button>
            </div>
          </div>
        </div>
      )}
    </ConfirmContext.Provider>
  );
}

// ── Error Boundary ────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null,info:null};}
  static getDerivedStateFromError(error){return {error};}
  componentDidCatch(error,info){console.error("[ErrorBoundary]",error,info);this.setState({info});}
  reset = ()=>{this.setState({error:null,info:null});}
  render(){
    if(this.state.error){
      return (
        <div style={{padding:"40px 24px",fontFamily:"sans-serif",maxWidth:720,margin:"0 auto",color:"#252525"}}>
          <h1 style={{color:"#dc2626",fontSize:"1.5rem",marginBottom:8}}>Something went wrong</h1>
          <p style={{color:"#4a5568",marginBottom:16,lineHeight:1.5}}>The app hit an unexpected error. Your data is safe — it\u2019s saved in your browser and Sheets. Try reloading, or click Reset to clear the error and continue.</p>
          <details style={{marginBottom:16,fontSize:"0.85rem",background:"#f3f4f6",padding:12,borderRadius:8,border:"1px solid #e5e7eb"}}>
            <summary style={{cursor:"pointer",fontWeight:600,marginBottom:8}}>Error details (for debugging)</summary>
            <pre style={{fontSize:"0.75rem",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:"8px 0 0 0",color:"#7f1d1d"}}>{String(this.state.error&&this.state.error.stack||this.state.error)}</pre>
          </details>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>window.location.reload()} style={{padding:"10px 18px",background:"#0036db",color:"#fff",border:"none",borderRadius:8,fontSize:"0.9rem",fontWeight:600,cursor:"pointer"}}>Reload App</button>
            <button onClick={this.reset} style={{padding:"10px 18px",background:"transparent",color:"#252525",border:"1px solid #d4dae8",borderRadius:8,fontSize:"0.9rem",cursor:"pointer"}}>Try Again</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App(){
  const[tasks,setTasksRaw]=useState(initTasks);

  // ── Lifecycle stamps: Complete gets completionDate, transitions to Archive after 7 days, then auto-expires after another 7 days ────
  useEffect(()=>{
    const today=fmtDate(new Date());
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
    let changed=false;
    const updated=tasks.map(t=>{
      // 1. Stamp completionDate when newly Complete (if missing)
      if(t.status==="Complete"&&!t.completionDate){
        changed=true;
        return Object.assign({},t,{completionDate:today});
      }
      // 2. Transition Complete → Archive - Complete after 7 days
      if(t.status==="Complete"&&t.completionDate){
        const d=parseDate(t.completionDate);
        if(d&&d<cutoff){
          changed=true;
          return Object.assign({},t,{status:"Archive - Complete",archiveCompleteDate:today});
        }
      }
      // 3. Stamp archiveCompleteDate if missing on Archive - Complete
      if(t.status==="Archive - Complete"&&!t.archiveCompleteDate){
        changed=true;
        return Object.assign({},t,{archiveCompleteDate:today});
      }
      return t;
    }).filter(t=>{
      // 4. Hard-expire Archive - Complete after another 7 days
      if(t.status!=="Archive - Complete") return true;
      const d=parseDate(t.archiveCompleteDate);
      return !d||d>=cutoff;
    });
    if(changed||updated.length!==tasks.length) setTasksRaw(updated);
  },[]);
  const confirmAsync=useConfirm();
  const toast=useToast();
  const[view,setView]=useState("work");const[workSubTab,setWorkSubTab]=useState("kanban");
  const[workstreams,setWorkstreams]=useState(DEFAULT_WORKSTREAMS);
  const[statuses,setStatuses]=useState(DEFAULT_STATUSES);
  const[members,setMembers]=useState(DEFAULT_MEMBERS);

  // ── Row-level sync helpers ────────────────────────────────────────────────

  // Debounced save for config sheets (workstreams, statuses, members, epics)

    const client=gsClientRef.current;
    const prevMap=new Map(prev.map(t=>[t.id,t]));
    const curMap=new Map(tasks.map(t=>[t.id,t]));
    const toUpsert=[];
    const toDelete=[];
    // Changed or new
    tasks.forEach(t=>{
      const p=prevMap.get(t.id);
      if(!p||JSON.stringify(p)!==JSON.stringify(t)) toUpsert.push(t);
    });
    // Deleted
    prev.forEach(t=>{ if(!curMap.has(t.id)) toDelete.push(t.id); });
    prevTasksRef.current=tasks;
    if(!toUpsert.length&&!toDelete.length) return;
    setGsSaving(true);
    (async()=>{
      try{
        const results=await Promise.allSettled([
          ...toUpsert.map(t=>client.upsertTask(t)),

        ]);

        if(hasConflict) setSyncConflict(true);

    })();
