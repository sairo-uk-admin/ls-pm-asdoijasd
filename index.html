  // ── connectSheets: ping + setup tabs, then always pull from Sheets ──────────
  async function connectSheets(){
    if(!gsUrl.trim())return;
    setGsError("");setGsConnected(false);
    try{
      const client=createSheetsClient(gsUrl);
      await client.ping();
      gsClientRef.current=client;
      // Ensure all tabs exist with correct headers (safe to re-run)
      await client.setupSheets();
      // Contacts tab is initialised by setupSheets via the client
      // Always pull Sheets → App on connect
      await pullFromSheets(client);
      setGsConnected(true);
      // Write meta so polling clients know Sheets was just updated
      await client.writeMeta(new Date().toISOString()).catch(()=>{});
      lastSyncRef.current=new Date().toISOString();
      // Brief delay so gsConnected state is committed before addLog tries to appendAudit
      setTimeout(()=>addLog("status_change","Connected to Google Sheets & pulled latest data"),50);
    }catch(e){
      const msg=e.message||String(e);
      setGsError(msg.toLowerCase().includes("failed to fetch")||msg.toLowerCase().includes("networkerror")
        ?"Could not reach the Apps Script. Check the URL and make sure it is deployed as a Web App with 'Anyone' access."
        :msg.slice(0,400));
    }
  }

  // ── pullFromSheets: load everything from Sheets into the App ────────────────
  // Can be called with an existing client (on connect) or uses gsClientRef.
  async function pullFromSheets(clientOverride){
    const client=clientOverride||gsClientRef.current;
    if(!client) throw new Error("Not connected to Google Sheets.");

    const [remoteTasks,remoteDec,remoteContacts,remoteWS,remoteSt,remoteMb,remoteEp,remoteAl,remoteEmoji,remoteAgenda,remoteWsHealth]=await Promise.all([
      client.loadTasks().catch(()=>null),
      client.loadDecisions().catch(()=>null),
      client.loadContacts().catch(()=>null),
      client.loadConfig("Workstreams").catch(()=>null),
      client.loadConfig("Statuses").catch(()=>null),
      client.loadConfig("Members").catch(()=>null),
      client.loadConfig("Epics").catch(()=>null),
      client.loadAuditLog().catch(()=>null),
      client.loadEmojiLog().catch(()=>null),
      client.loadConfig("Agenda").catch(()=>null),
      client.loadConfig("WorkstreamHealth").catch(()=>null),
    ]);

    // Tasks: use Sheets data if present, else seed Sheets with app state
    let loadedTasks=tasks;
    if(remoteTasks&&remoteTasks.length){
      loadedTasks=remoteTasks;
    } else if(!clientOverride){
      // Only seed on manual pull if Sheets is empty (don't overwrite on auto-connect)
      await client.bulkWriteTasks(tasks);
    }

    // Decisions
    let loadedDec=decisions;
    if(remoteDec&&remoteDec.length){
      loadedDec=remoteDec;
    }

    // Contacts
    let loadedContacts=contacts;
    if(remoteContacts&&remoteContacts.length){
      loadedContacts=remoteContacts;
    }

    // Config — fall back to current app state if Sheets has nothing
    const loadedWS=(remoteWS&&remoteWS.length)?remoteWS:workstreams;
    const loadedSt=(remoteSt&&remoteSt.length)?remoteSt:statuses;
    const loadedMb=(remoteMb&&remoteMb.length)?remoteMb:members;
    const loadedEp=(remoteEp&&remoteEp.length)?remoteEp:epics;
    const loadedAl=(remoteAl&&remoteAl.length)?remoteAl:activityLog;

    // Set diff-tracking refs BEFORE applying state so auto-save effects
    // don't fire and overwrite what we just pulled
    prevTasksRef.current=loadedTasks;
    prevDecisionsRef.current=loadedDec;
    prevContactsRef.current=loadedContacts;

    setTasksRaw(loadedTasks);
    setWorkstreams(loadedWS);
    setStatuses(loadedSt);
    setMembers(loadedMb);
    setEpics(loadedEp);
    setDecisions(loadedDec);
    setContacts(loadedContacts);
    setActivityLog(loadedAl);
    if(remoteEmoji&&remoteEmoji.length)setEmojiLog(remoteEmoji);
    if(remoteAgenda&&remoteAgenda.text&&new Date().getDay()!==5)setAgendaText(remoteAgenda.text);
    if(remoteWsHealth&&typeof remoteWsHealth==="object")setWorkstreamHealth(remoteWsHealth);

    lastSyncRef.current=new Date().toISOString();
    setSyncConflict(false);
    addLog("status_change","Pulled latest data from Google Sheets");
  }

  // ── pushToSheets: force-write everything from App to Sheets ─────────────────
  async function pushToSheets(){
    const client=gsClientRef.current;
    if(!client) throw new Error("Not connected to Google Sheets.");

    // bulkWrite all tabular data (clears + rewrites)
    const lockedBy=taskDefaults.assignee||"unknown";
    await Promise.all([
      client.bulkWriteTasks(tasks,lockedBy),
      client.bulkWriteDecisions(decisions,lockedBy),
      client.bulkWriteContacts(contacts,lockedBy),
    ]);
    // Config sheets
    await Promise.all([
      client.saveConfig("Workstreams",workstreams),
      client.saveConfig("Statuses",statuses),
      client.saveConfig("Members",members),
      client.saveConfig("Epics",epics),
      client.saveConfig("WorkstreamHealth",workstreamHealth),
    ]);

    // Update diff refs so the incremental effects don't re-fire immediately
    prevTasksRef.current=tasks;
    prevDecisionsRef.current=decisions;
    prevContactsRef.current=contacts;

    // Write a _meta record so polling clients know to pull
    await gsClientRef.current.writeMeta(fmtDate(TODAY)+"T"+fmtTime(new Date())).catch(()=>{});
    lastSyncRef.current=new Date().toISOString();
    addLog("status_change","Pushed all data to Google Sheets");
  }

  // ── One-time migration: assign UIDs to old numeric IDs ──────────────────
  useEffect(()=>{
    // Tasks with numeric IDs (1, 2, 3...) get migrated to uid() format
    // We store a migration flag in localStorage so this only runs once
    const flag="livesync_uid_migrated_v1";
    if(localStorage.getItem(flag)) return;
    let needsMigration=false;
    const idMap={}; // old id -> new id
    const migratedTasks=tasks.map(t=>{
      if(typeof t.id==="number"||(typeof t.id==="string"&&/^\d+$/.test(t.id))){
        needsMigration=true;
        const newId=uid("tsk");
        idMap[String(t.id)]=newId;
        return Object.assign({},t,{id:newId,lastModified:t.lastModified||fmtDate(TODAY),modifiedBy:t.modifiedBy||""});
      }
      return t;
    });
    if(needsMigration){
      setTasksRaw(migratedTasks);
      console.log("LiveSync: migrated",Object.keys(idMap).length,"tasks to UUID format");
    }
    localStorage.setItem(flag,"1");

  function addLog(type,description){

  const filtered=(()=>{
    const base=tasks.filter(t=>
      (filterMember==="All"||t.assignee===filterMember)&&
      (filterWS==="All"||t.workstream===filterWS)&&
      (filterStatus==="All"||t.status===filterStatus)

      if(col==="assignee") return d*(a.assignee||"").localeCompare(b.assignee||"");

  function openNew(){const dWS=taskDefaults.workstream&&workstreams.find(w=>w.name===taskDefaults.workstream)?taskDefaults.workstream:"N/A";const dAssignee=taskDefaults.assignee&&members.find(m=>m.name===taskDefaults.assignee)?taskDefaults.assignee:members[0]?.name||"";const dStatus=taskDefaults.status&&statuses.find(s=>s.name===taskDefaults.status)?taskDefaults.status:statuses[0]?.name||"";setEditTask({id:null,name:"",workstream:dWS,epic:"N/A",assignee:dAssignee,status:dStatus,priority:"N/A",start:"",deadline:"",notes:"",checklist:[],lastReviewed:""});setShowModal(true);}

  function saveTask(){
    if(!editTask.name.trim())return;
    const isAC=editTask.status==="Archive - Complete";
    const isComplete=editTask.status==="Complete";
    const stamped=Object.assign({},editTask,{lastModified:new Date().toISOString(),modifiedBy:taskDefaults.assignee||""},isAC&&!editTask.archiveCompleteDate?{archiveCompleteDate:fmtDate(TODAY)}:{},isComplete&&!editTask.completionDate?{completionDate:fmtDate(TODAY)}:{});
    if(stamped.id){const old=tasks.find(t=>t.id===stamped.id);setTasks(ts=>ts.map(t=>t.id===stamped.id?stamped:t));if(old&&old.status!==stamped.status){addLog("status_change","Status: "+stamped.name+" — "+old.status+" to "+stamped.status);if(stamped.status==="Complete"||stamped.status==="Complete - RR")addLog("task_complete","Completed: "+stamped.name);}else addLog("task_update","Edited: "+stamped.name);}
    else{setTasks(ts=>[...ts,Object.assign({},stamped,{id:uid("tsk")})]);addLog("task_add","Added: "+stamped.name);}

  async function deleteTask(id){

// ── COMBOBOX — type-to-filter + click arrow to browse + create new ────────────
function Combobox({value,onChange,options,placeholder,onCreateNew}){
  const[open,setOpen]=useState(false);
  const[query,setQuery]=useState("");
  const ref=useRef();
  // Reset query when closing or when value changes externally
  useEffect(()=>{if(!open)setQuery("");},[open,value]);
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=options.filter(o=>o.toLowerCase().includes(query.toLowerCase()));
  const showCreate=query.trim()&&!options.find(o=>o.toLowerCase()===query.trim().toLowerCase());
  function select(opt){onChange(opt);setQuery("");setOpen(false);}
  // Only filter on input — don't propagate intermediate typing to onChange.
  // The actual value only changes on select() or onCreateNew().
  function handleInput(e){setQuery(e.target.value);setOpen(true);}
  function handleKey(e){
    if(e.key==="Enter"){
      e.preventDefault();
      if(filtered.length>0&&filtered[0].toLowerCase()===query.trim().toLowerCase())select(filtered[0]);
      else if(showCreate)handleCreate();
      else if(filtered.length===1)select(filtered[0]);
    } else if(e.key==="Escape"){
      setOpen(false);setQuery("");
    }
  }
  function handleCreate(){if(onCreateNew&&query.trim()){onCreateNew(query.trim());select(query.trim());}}
  return(
    <div ref={ref} className="relative">
      <div className="flex items-center bg-gray-800 border border-gray-700 rounded-lg focus-within:border-indigo-500 overflow-hidden">
        <input
          value={open?query:value}
          onChange={handleInput}
          onFocus={()=>{setQuery("");setOpen(true);}}
          onKeyDown={handleKey}
          placeholder={placeholder||"Type or select..."}
          className="flex-1 bg-transparent px-3 py-2 text-sm text-gray-200 focus:outline-none"
        />
        <button
          type="button"
          onMouseDown={e=>{e.preventDefault();setOpen(o=>!o);if(!open)setQuery("");}}
          className="px-2 py-2 text-gray-500 hover:text-gray-300 flex-shrink-0"
        >▾</button>
      </div>
      {open&&<div className="absolute z-50 top-full left-0 right-0 mt-1 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl py-1 max-h-52 overflow-y-auto">
        {filtered.length===0&&!showCreate&&<div className="px-3 py-2 text-xs text-gray-600">No matches</div>}
        {filtered.map(o=>(
          <button key={o} type="button" onMouseDown={e=>{e.preventDefault();select(o);}} className={"w-full text-left px-3 py-1.5 text-sm hover:bg-gray-800 "+(value===o?"text-indigo-300 bg-gray-800/50":"text-gray-200")}>{o}</button>
        ))}
        {showCreate&&(
          <button type="button" onMouseDown={e=>{e.preventDefault();handleCreate();}} className="w-full text-left px-3 py-1.5 text-sm text-indigo-400 hover:bg-gray-800 border-t border-gray-800 mt-1 pt-2">
            + Create "{query.trim()}"
          </button>
        )}
      </div>}
    </div>
  );
}

  "Term Sheet":"bg-yellow-700 text-yellow-100",
  "Closed":"bg-green-700 text-green-100",
  "Passed":"bg-gray-700 text-gray-400 italic",
  "N/A":"bg-gray-900 text-gray-600",
};

function blankContact(){
  return {id:null,name:"",company:"",fund:"",jobRole:"",type:"",stage:"",email:"",linkedin:"",phone:"",poc:"",assignee:"",introducedBy:"",source:"",channel:"",warmth:"",lastTouchDate:"",nextActionDate:"",nextAction:"",checkSize:"",thesisFit:"",notes:"",tags:[],log:[]};
}

function daysSince(dateStr){
  if(!dateStr) return null;
  const d=parseDate(dateStr);
  if(!d) return null;
  return diffDays(d,TODAY);
}

function ContactsView({contacts,setContacts,members,addLog}){
  const confirmAsync=useConfirm();
  const toast=useToast();
  const[cView,setCView]=useState("table");
  const[contactSort,setContactSort]=useState({col:"warmth",dir:"asc"});
  const[filterType,setFilterType]=useState("All");
  const[filterWarmth,setFilterWarmth]=useState("All");
  const[filterAssignee,setFilterAssignee]=useState("All");
  const[filterStage,setFilterStage]=useState("All");
  const[search,setSearch]=useState("");
  const[showModal,setShowModal]=useState(false);
  const[editContact,setEditContact]=useState(null);
  // Close contact modal on Escape
  useEffect(()=>{
    if(!showModal)return;
    function onKey(e){if(e.key==="Escape")setShowModal(false);}
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[showModal]);
  const[activeContact,setActiveContact]=useState(null);
  const[logInput,setLogInput]=useState("");
  const[tagInput,setTagInput]=useState("");
  const[detailTab,setDetailTab]=useState("profile");
  const[modalTab,setModalTab]=useState("profile");
  // Pipeline status — single shared narrative, persisted to localStorage
  const[pipelineStatus,setPipelineStatus]=useState(()=>{try{const s=localStorage.getItem("ls_pipeline_status");return s||"";}catch{return "";}});
  const[pipelineSaved,setPipelineSaved]=useState(false);
  const pipelineSaveTimer=useRef(null);
  function handlePipelineStatus(val){
    setPipelineStatus(val);
    setPipelineSaved(false);
    if(pipelineSaveTimer.current) clearTimeout(pipelineSaveTimer.current);
    pipelineSaveTimer.current=setTimeout(()=>{
      try{localStorage.setItem("ls_pipeline_status",val);setPipelineSaved(true);setTimeout(()=>setPipelineSaved(false),1500);}catch(e){}
    },800);
  }

  const inp="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500";
  const lbl="text-xs text-gray-400 block mb-1";

  function openNew(){setEditContact(blankContact());setModalTab("profile");setTagInput("");setShowModal(true);}
  function openEdit(contact){setEditContact(Object.assign({},contact,{log:contact.log||[],tags:contact.tags||[]}));setModalTab("profile");setTagInput("");setShowModal(true);}

  function saveContact(){
    if(!editContact||!editContact.name.trim()) return;
    if(editContact.id){
      const updated=Object.assign({},editContact,{lastModified:new Date().toISOString(),modifiedBy:editContact.assignee||""});
      setContacts(cs=>cs.map(c=>c.id===editContact.id?updated:c));
      addLog("task_update","Contact updated: "+editContact.name);
      if(activeContact&&activeContact.id===editContact.id) setActiveContact(updated);
    } else {
      const nc=Object.assign({},editContact,{id:uid("cnt"),lastModified:new Date().toISOString(),modifiedBy:editContact.assignee||"",lastTouchDate:fmtDate(TODAY)});
      setContacts(cs=>[nc,...cs]);
      addLog("task_add","Contact added: "+nc.name);
    }
    setShowModal(false);
  }

  async function deleteContact(id){
    const contact=contacts.find(x=>x.id===id);
    const ok=await confirmAsync({title:"Delete contact?",message:"Delete \""+(contact?contact.name:"this contact")+"\"? This cannot be undone.",confirmLabel:"Delete",danger:true});
    if(!ok)return;
    setContacts(cs=>cs.filter(x=>x.id!==id));
    if(activeContact&&activeContact.id===id) setActiveContact(null);
    if(contact){addLog("task_update","Contact deleted: "+contact.name);toast("Contact deleted","success");}
  }

  function addLogEntry(contactId){
    if(!logInput.trim()) return;
    const entry={id:uid("clog"),date:fmtDate(TODAY),text:logInput.trim(),channel:activeContact?.channel||"Email"};
    setContacts(cs=>cs.map(c=>{
      if(c.id!==contactId) return c;
      const updated=Object.assign({},c,{log:[entry,...(c.log||[])],lastTouchDate:fmtDate(TODAY)});
      if(activeContact&&activeContact.id===contactId) setActiveContact(updated);
      return updated;
    }));
    setLogInput("");
  }

  function addTag(){
    const t=tagInput.trim();
    if(!t||!editContact) return;
    if(!(editContact.tags||[]).includes(t)) setEditContact(ec=>Object.assign({},ec,{tags:[...(ec.tags||[]),t]}));
    setTagInput("");
  }

  const filtered=contacts.filter(c=>{
    if(filterType!=="All"&&c.type!==filterType) return false;
    if(filterWarmth!=="All"&&c.warmth!==filterWarmth) return false;
    if(filterAssignee!=="All"&&c.assignee!==filterAssignee) return false;
    if(filterStage!=="All"&&c.stage!==filterStage) return false;
    if(search){
      const s=search.toLowerCase();
      if(!(c.name+c.company+c.jobRole+c.notes+(c.tags||[]).join(" ")).toLowerCase().includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>{
    const{col:sc,dir}=contactSort;const d=dir==="asc"?1:-1;
    if(sc==="warmth"){const wo={Hot:0,Warm:1,Cold:2};const diff=(wo[a.warmth]||1)-(wo[b.warmth]||1);if(diff!==0)return d*diff;}
    if(sc==="name") return d*(a.name||"").localeCompare(b.name||"");
    if(sc==="company") return d*(a.company||"").localeCompare(b.company||"");
    if(sc==="stage"){const so=["Identified","Intro Requested","Intro Made","First Call","DD","Term Sheet","Closed","Passed","N/A"];return d*(so.indexOf(a.stage)-so.indexOf(b.stage));}
    if(sc==="lastTouchDate"){return d*((a.lastTouchDate||"0").localeCompare(b.lastTouchDate||"0"));}
    if(sc==="nextActionDate"){if(a.nextActionDate&&b.nextActionDate)return d*(a.nextActionDate.localeCompare(b.nextActionDate));if(a.nextActionDate)return -1;if(b.nextActionDate)return 1;return 0;}
    const wo={Hot:0,Warm:1,Cold:2};const wdiff=(wo[a.warmth]||1)-(wo[b.warmth]||1);if(wdiff!==0)return wdiff;
    if(a.nextActionDate&&b.nextActionDate)return a.nextActionDate.localeCompare(b.nextActionDate);
    if(a.nextActionDate)return -1;if(b.nextActionDate)return 1;return 0;
  });

  const overdueFU=contacts.filter(c=>{
    if(!c.nextActionDate) return false;
    const d=parseDate(c.nextActionDate);
    return d&&diffDays(d,TODAY)>0;
  });

  return(
    <div className="w-full">
      {/* ── Header ── */}
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <h2 className="text-2xl font-bold">Contacts</h2>
          <span className="text-xs text-gray-500 bg-gray-900 border border-gray-800 px-2 py-0.5 rounded-full">{contacts.length} total</span>
          {overdueFU.length>0&&<span className="text-xs bg-red-900 text-red-300 border border-red-700 px-2 py-0.5 rounded-full font-semibold">{overdueFU.length} follow-up{overdueFU.length>1?"s":""} overdue</span>}
        </div>
        <div className="flex items-center gap-2">
          {["table","kanban"].map(v=>(
            <button key={v} onClick={()=>{setCView(v);setActiveContact(null);}} className={"px-3 py-1.5 rounded-lg text-xs font-medium "+(cView===v?"bg-indigo-600 text-white":"bg-gray-800 text-gray-400 hover:text-white")}>
              {v==="table"?"Table":"Pipeline"}
            </button>
          ))}
          <select value={contactSort.col+"_"+contactSort.dir} onChange={e=>{const[col,dir]=e.target.value.split("_");setContactSort({col,dir});}} className="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200">
            <option value="warmth_asc">Warmth (Hot first)</option>
            <option value="name_asc">Name A–Z</option>
            <option value="name_desc">Name Z–A</option>
            <option value="company_asc">Company A–Z</option>
            <option value="stage_asc">Stage (early first)</option>
            <option value="stage_desc">Stage (late first)</option>
            <option value="lastTouchDate_desc">Last Touch (newest)</option>
            <option value="lastTouchDate_asc">Last Touch (oldest)</option>
            <option value="nextActionDate_asc">Next Action (soonest)</option>
          </select>
          <button onClick={openNew} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg text-sm font-medium">+ Add Contact</button>
        </div>
      </div>

      {/* ── Filters ── */}
      <div className="flex gap-2 mb-4 flex-wrap items-center">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, company, notes, tags..." className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none w-56"/>
        {[["Type",filterType,setFilterType,["All",...CONTACT_TYPES]],["Warmth",filterWarmth,setFilterWarmth,["All",...CONTACT_WARMTH]],["Stage",filterStage,setFilterStage,["All",...CONTACT_STAGES]],["Assignee",filterAssignee,setFilterAssignee,["All",...members.filter(m=>m.name!=="Unassigned").map(m=>m.name)]]].map(([label,val,set,opts])=>(
          <select key={label} value={val} onChange={e=>set(e.target.value)} className="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200">
            {opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        {(search||filterType!=="All"||filterWarmth!=="All"||filterStage!=="All"||filterAssignee!=="All")&&(
          <button onClick={()=>{setSearch("");setFilterType("All");setFilterWarmth("All");setFilterStage("All");setFilterAssignee("All");}} className="text-xs text-gray-500 hover:text-white">✕ Clear</button>
        )}
      </div>

      {/* ── Table view ── */}
      {cView==="table"&&(
        <div className="flex gap-4">
          <div className={"flex-1 min-w-0 bg-gray-900 rounded-xl border border-gray-800 overflow-hidden"+(activeContact?" max-w-3xl":"")}>
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-gray-800 text-gray-500 text-xs uppercase">
                  {[["name","Name",""],["company","Company","hidden md:table-cell"],["","Type","hidden lg:table-cell"],["stage","Stage",""],["warmth","Warmth","hidden lg:table-cell"],["lastTouchDate","Last Touch","hidden md:table-cell"],["nextActionDate","Next Action","hidden xl:table-cell"]].map(([col,label,cls])=>(
                    <th key={label} className={"text-left p-3 select-none "+(cls||"")+(col?" cursor-pointer hover:text-white":"")} onClick={col?()=>setContactSort(s=>({col,dir:s.col===col&&s.dir==="asc"?"desc":"asc"})):undefined}>
                      {label}{col&&contactSort.col===col?<span className="ml-1 text-indigo-400">{contactSort.dir==="asc"?"▲":"▼"}</span>:col?<span className="ml-1 text-gray-700">⇅</span>:null}
                    </th>
                  ))}
                  <th className="p-3"/>
                </tr>
              </thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan="8" className="p-8 text-center text-gray-500">No contacts match filters</td></tr>}
                {filtered.map(c=>{
                  const ds=daysSince(c.lastTouchDate);
                  const nad=c.nextActionDate?parseDate(c.nextActionDate):null;
                  const naOverdue=nad&&diffDays(nad,TODAY)>0;
                  const isSelected=activeContact&&activeContact.id===c.id;
                  return(
                    <tr key={c.id} onClick={()=>setActiveContact(isSelected?null:c)} className={"border-b border-gray-800 cursor-pointer hover:bg-gray-800/60 "+(isSelected?"bg-indigo-950/40":"")+(naOverdue?" bg-red-950/10":"")}>
                      <td className="p-3">
                        <div className="font-medium text-gray-200">{c.name}</div>
                        <div className="text-xs text-gray-500">{c.jobRole}</div>
                      </td>
                      <td className="p-3 hidden md:table-cell text-gray-400 text-xs">{c.company}</td>
                      <td className="p-3 hidden lg:table-cell"><span className="text-xs text-gray-400 bg-gray-800 px-2 py-0.5 rounded">{c.type||"—"}</span></td>
                      <td className="p-3"><span className={"text-xs px-2 py-0.5 rounded font-medium "+(STAGE_STYLE[c.stage]||"bg-gray-800 text-gray-400")}>{c.stage||"—"}</span></td>
                      <td className="p-3 hidden lg:table-cell">{c.warmth&&<span className={"text-xs px-2 py-0.5 rounded "+(WARMTH_STYLE[c.warmth]?.badge||"bg-gray-800 text-gray-400")}>{c.warmth}</span>}</td>
                      <td className="p-3 hidden md:table-cell"><span className={"text-xs "+(ds===null?"text-gray-600":ds>14?"text-red-400 font-semibold":ds>7?"text-yellow-400":"text-gray-400")}>{ds===null?"—":ds===0?"Today":ds===1?"Yesterday":ds+"d ago"}</span></td>
                      <td className="p-3 hidden xl:table-cell">
                        {c.nextAction?(
                          <div>
                            <div className={"text-xs "+(naOverdue?"text-red-400 font-semibold":"text-gray-300")}>{c.nextAction}</div>
                            {c.nextActionDate&&<div className={"text-xs "+(naOverdue?"text-red-500":"text-gray-500")}>{c.nextActionDate}</div>}
                          </div>
                        ):<span className="text-gray-600 text-xs">—</span>}
                      </td>
                      <td className="p-3">
                        <div className="flex gap-1" onClick={e=>e.stopPropagation()}>
                          <button onClick={()=>openEdit(c)} className="text-gray-500 hover:text-white p-1 text-xs">✏️</button>
                          <button onClick={()=>deleteContact(c.id)} className="text-gray-500 hover:text-red-400 p-1 text-xs" aria-label="Delete contact" title="Delete contact">🗑</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Detail panel */}
          {activeContact&&(
            <div className="w-80 flex-shrink-0 bg-gray-900 border border-gray-800 rounded-xl overflow-hidden flex flex-col" style={{maxHeight:"75vh"}}>
              <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800">
                <div className="flex gap-3">
                  {["profile","log"].map(t=>(
                    <button key={t} onClick={()=>setDetailTab(t)} className={"text-xs font-medium px-2 py-1 rounded "+(detailTab===t?"bg-indigo-600 text-white":"text-gray-400 hover:text-white")}>
                      {t==="profile"?"Profile":"Log ("+((activeContact.log||[]).length)+")"}
                    </button>
                  ))}
                </div>
                <button onClick={()=>setActiveContact(null)} className="text-gray-600 hover:text-white text-sm">✕</button>
              </div>
              <div className="overflow-y-auto flex-1 p-4">
                {detailTab==="profile"&&(
                  <div className="space-y-3">
                    <div>
                      <div className="font-bold text-gray-100 text-base">{activeContact.name}</div>
                      <div className="text-sm text-gray-400">{activeContact.jobRole}{activeContact.company?" · "+activeContact.company:""}</div>
                    </div>
                    <div className="flex flex-wrap gap-1.5">
                      {activeContact.warmth&&<span className={"text-xs px-2 py-0.5 rounded "+(WARMTH_STYLE[activeContact.warmth]?.badge||"")}>{activeContact.warmth}</span>}
                      {activeContact.stage&&<span className={"text-xs px-2 py-0.5 rounded "+(STAGE_STYLE[activeContact.stage]||"bg-gray-800 text-gray-400")}>{activeContact.stage}</span>}
                      {activeContact.type&&<span className="text-xs px-2 py-0.5 rounded bg-gray-800 text-gray-400">{activeContact.type}</span>}
                    </div>
                    {[["Email",activeContact.email,"mailto:"+activeContact.email],["LinkedIn",activeContact.linkedin?activeContact.linkedin.replace(/^https?:\/\//,"").slice(0,28)+"…":null,activeContact.linkedin],["Phone",activeContact.phone,null]].filter(r=>r[1]).map(([label,val,href])=>(
                      <div key={label} className="flex items-center gap-2">
                        <span className="text-xs text-gray-500 w-14">{label}</span>
                        {href?<a href={href} target="_blank" rel="noopener noreferrer" className="text-xs text-indigo-400 hover:underline truncate">{val}</a>:<span className="text-xs text-gray-300">{val}</span>}
                      </div>
                    ))}
                    {[["Internal owner",activeContact.poc],["Assignee",activeContact.assignee],["Introduced by",activeContact.introducedBy],["Source",activeContact.source],["Check size",activeContact.checkSize],["Thesis fit",activeContact.thesisFit]].filter(r=>r[1]).map(([label,val])=>(
                      <div key={label} className="flex items-start gap-2">
                        <span className="text-xs text-gray-500 w-20 flex-shrink-0">{label}</span>
                        <span className="text-xs text-gray-300">{val}</span>
                      </div>
                    ))}
                    {activeContact.nextAction&&(
                      <div className="bg-indigo-900/30 border border-indigo-800 rounded-lg p-3">
                        <div className="text-xs text-indigo-300 font-semibold mb-0.5">Next action</div>
                        <div className="text-sm text-gray-200">{activeContact.nextAction}</div>
                        {activeContact.nextActionDate&&<div className={"text-xs mt-1 "+(parseDate(activeContact.nextActionDate)&&diffDays(parseDate(activeContact.nextActionDate),TODAY)>0?"text-red-400 font-semibold":"text-indigo-400")}>{activeContact.nextActionDate}</div>}
                      </div>
                    )}
                    {activeContact.notes&&<div><div className="text-xs text-gray-500 mb-1">Notes</div><p className="text-xs text-gray-300 leading-relaxed">{activeContact.notes}</p></div>}
                    {activeContact.tags&&activeContact.tags.length>0&&<div className="flex flex-wrap gap-1">{activeContact.tags.map(t=><span key={t} className="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">{t}</span>)}</div>}
                    <button onClick={()=>openEdit(activeContact)} className="w-full mt-2 text-xs bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-lg text-gray-300">✏️ Edit contact</button>
                  </div>
                )}
                {detailTab==="log"&&(
                  <div>
                    <div className="flex gap-2 mb-3">
                      <input value={logInput} onChange={e=>setLogInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLogEntry(activeContact.id)} placeholder="Add a note..." className="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-gray-200 focus:outline-none"/>
                      <button onClick={()=>addLogEntry(activeContact.id)} className="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-xs">Add</button>
                    </div>
                    {(activeContact.log||[]).length===0&&<p className="text-xs text-gray-600 text-center py-4">No log entries yet.</p>}
                    <div className="space-y-2">
                      {(activeContact.log||[]).map(entry=>(
                        <div key={entry.id} className="bg-gray-800/60 rounded-lg p-3">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-xs text-gray-500">{entry.date}</span>
                            {entry.channel&&<span className="text-xs bg-gray-700 text-gray-400 px-1.5 py-0.5 rounded">{entry.channel}</span>}
                          </div>
                          <p className="text-xs text-gray-300 leading-relaxed">{entry.text}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── Kanban / pipeline view ── */}
      {cView==="kanban"&&(
        <div>
          {/* Pipeline status box */}
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-full bg-indigo-400"/>
                <span className="text-sm font-semibold text-gray-200">Pipeline Status</span>
                <span className="text-xs text-gray-500">— weekly narrative</span>
              </div>
              {pipelineSaved&&<span className="text-xs text-green-400">✓ Saved</span>}
            </div>
            <textarea
              value={pipelineStatus}
              onChange={e=>handlePipelineStatus(e.target.value)}
              placeholder="Summarise where the investment pipeline stands this week — key conversations, next steps, blockers..."
              className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y"
              style={{minHeight:90,lineHeight:"1.6"}}
            />
          </div>
          <div className="overflow-x-auto pb-4">
          <div className="flex gap-3" style={{minWidth:"max-content"}}>
            {CONTACT_STAGES.filter(s=>s!=="N/A").map(stage=>{
              const col=filtered.filter(c=>c.stage===stage);
              return(
                <div key={stage} className="w-56 flex-shrink-0">
                  <div className="flex items-center gap-2 mb-2 px-1">
                    <span className={"text-xs px-2 py-0.5 rounded font-medium "+(STAGE_STYLE[stage]||"bg-gray-800 text-gray-400")}>{stage}</span>
                    <span className="text-xs text-gray-600">{col.length}</span>
                  </div>
                  <div className="space-y-2">
                    {col.map(c=>{
                      const ds=daysSince(c.lastTouchDate);
                      const nad=c.nextActionDate?parseDate(c.nextActionDate):null;
                      const naOverdue=nad&&diffDays(nad,TODAY)>0;
                      return(
                        <div role="button" tabIndex={0} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();setCView("table");setActiveContact(c);}}} key={c.id} onClick={()=>{setCView("table");setActiveContact(c);}} className={"bg-gray-900 border rounded-xl p-3 cursor-pointer hover:bg-gray-800 "+(naOverdue?"border-red-800":"border-gray-800")}>
                          <div className="flex items-start justify-between gap-1 mb-1">
                            <div className="font-medium text-sm text-gray-200 leading-tight">{c.name}</div>
                            {c.warmth&&<span className={"w-2 h-2 rounded-full flex-shrink-0 mt-1 "+(WARMTH_STYLE[c.warmth]?.dot||"bg-gray-500")}/>}
                          </div>
                          {c.company&&<div className="text-xs text-gray-500 mb-1.5">{c.company}</div>}
                          {c.checkSize&&<div className="text-xs text-emerald-400 font-medium mb-1">{c.checkSize}</div>}
                          {c.nextAction&&<div className={"text-xs truncate mb-1 "+(naOverdue?"text-red-400":"text-indigo-300")}>→ {c.nextAction}</div>}
                          <div className="flex items-center justify-between">
                            <span className={"text-xs "+(ds===null?"text-gray-700":ds>14?"text-red-500":ds>7?"text-yellow-500":"text-gray-600")}>{ds===null?"no touch":ds===0?"today":ds+"d ago"}</span>
                            {c.assignee&&<span className="text-xs text-gray-600">{c.assignee.split(" ")[0]}</span>}
                          </div>
                        </div>
                      );
                    })}
                    {col.length===0&&<div className="border border-dashed border-gray-800 rounded-xl p-3 text-center text-gray-700 text-xs">Empty</div>}
                  </div>
                </div>
              );
            })}
          </div>
          </div>
        </div>
      )}

      {/* ── Add/Edit Modal ── */}
      {showModal&&editContact&&(
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4 overflow-y-auto" style={{background:"rgba(0,0,0,0.8)"}}>
          <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full my-4 overflow-hidden" style={{maxWidth:600}}>

            <div className="px-6 pt-5 pb-0 border-b border-gray-800">
              <h3 className="font-bold text-lg text-gray-100">{editContact.id?"Edit contact":"New contact"}</h3>

                    <div><label className={lbl}>Phone</label><input value={editContact.phone} onChange={e=>setEditContact(ec=>Object.assign({},ec,{phone:e.target.value}))} className={inp} placeholder="+44 ..."/></div>

                      <div><label className={lbl}>Assignee</label>
                        <select value={editContact.assignee} onChange={e=>setEditContact(ec=>Object.assign({},ec,{assignee:e.target.value}))} className={inp}>
                          <option value="">— None —</option>
                          {members.filter(m=>m.name!=="Unassigned").map(m=><option key={m.id}>{m.name}</option>)}

                  <div><label className={lbl}>Notes</label><textarea value={editContact.notes} onChange={e=>setEditContact(ec=>Object.assign({},ec,{notes:e.target.value}))} className={inp+" resize-y min-h-[72px]"} placeholder="Anything worth remembering..."/></div>

                        {(editContact.tags||[]).map(t=>(
                          <span key={t} className="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full flex items-center gap-1">
                            {t}
                            <button type="button" onClick={()=>setEditContact(ec=>Object.assign({},ec,{tags:(ec.tags||[]).filter(x=>x!==t)}))} className="text-gray-600 hover:text-red-400">×</button>
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {modalTab==="relationship"&&(
                <div className="space-y-4">
                  <div className="grid grid-cols-3 gap-3">
                    <div><label className={lbl}>Type</label>
                      <select value={editContact.type} onChange={e=>setEditContact(ec=>Object.assign({},ec,{type:e.target.value}))} className={inp}>
                        <option value="">— Select —</option>
                        {CONTACT_TYPES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div><label className={lbl}>Stage</label>
                      <select value={editContact.stage} onChange={e=>setEditContact(ec=>Object.assign({},ec,{stage:e.target.value}))} className={inp}>
                        {CONTACT_STAGES.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                    <div><label className={lbl}>Channel</label>
                      <select value={editContact.channel} onChange={e=>setEditContact(ec=>Object.assign({},ec,{channel:e.target.value}))} className={inp}>
                        <option value="">— Select —</option>
                        {CONTACT_CHANNELS.map(ch=><option key={ch}>{ch}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className={lbl}>Warmth</label>
                    <div className="flex gap-2 mt-1">
                      {[["","— Not set","border-gray-700 text-gray-500 bg-transparent"],["Hot","Hot","border-red-600 text-red-400 bg-red-900/20"],["Warm","Warm","border-amber-600 text-amber-400 bg-amber-900/20"],["Cold","Cold","border-blue-700 text-blue-400 bg-blue-900/20"]].map(([val,label,activeClass])=>(
                        <button key={val} type="button" onClick={()=>setEditContact(ec=>Object.assign({},ec,{warmth:val}))}
                          className={"flex-1 py-1.5 text-xs rounded-lg border transition-colors "+(editContact.warmth===val?activeClass+" font-semibold":"border-gray-700 text-gray-600 hover:border-gray-500 hover:text-gray-400")}>

                    </div>
                  </div>
                  <div><label className={lbl}>Source</label>
                    <select value={editContact.source} onChange={e=>setEditContact(ec=>Object.assign({},ec,{source:e.target.value}))} className={inp}>
                      <option value="">— Select —</option>
                      {CONTACT_SOURCES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="bg-gray-800/50 border border-gray-700 rounded-xl p-4 space-y-3">
                    <p className="text-xs text-gray-500 font-medium uppercase tracking-wide">Follow-up</p>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className={lbl}>Last touch date</label>
                        <div className="flex gap-2">
                          <input type="date" value={editContact.lastTouchDate} onChange={e=>setEditContact(ec=>Object.assign({},ec,{lastTouchDate:e.target.value}))} className={inp}/>
                          <button type="button" onClick={()=>setEditContact(ec=>Object.assign({},ec,{lastTouchDate:fmtDate(TODAY)}))} className="text-xs text-indigo-400 hover:text-indigo-300 bg-indigo-900/30 px-2 rounded border border-indigo-800 whitespace-nowrap">Today</button>
                        </div>
                      </div>
                      <div><label className={lbl}>Next action date</label><input type="date" value={editContact.nextActionDate} onChange={e=>setEditContact(ec=>Object.assign({},ec,{nextActionDate:e.target.value}))} className={inp}/></div>
                    </div>
                    <div><label className={lbl}>Next action</label><input value={editContact.nextAction} onChange={e=>setEditContact(ec=>Object.assign({},ec,{nextAction:e.target.value}))} className={inp} placeholder="e.g. Send deck, Follow up on term sheet..."/></div>
                  </div>
                  {editContact.type==="Investor"&&(
                    <div className="border border-gray-700 rounded-xl p-4 space-y-3 relative">
                      <span className="absolute -top-2.5 left-3 text-xs bg-indigo-900 text-indigo-300 px-2 py-0.5 rounded border border-indigo-700">Investor details</span>
                      <div className="grid grid-cols-2 gap-3">
                        <div><label className={lbl}>Check size</label><input value={editContact.checkSize} onChange={e=>setEditContact(ec=>Object.assign({},ec,{checkSize:e.target.value}))} className={inp} placeholder="e.g. £250k–500k"/></div>
                        <div><label className={lbl}>Fund / firm</label><input value={editContact.fund||""} onChange={e=>setEditContact(ec=>Object.assign({},ec,{fund:e.target.value}))} className={inp} placeholder="Legal entity name"/></div>
                      </div>
                      <div><label className={lbl}>Thesis fit</label><input value={editContact.thesisFit} onChange={e=>setEditContact(ec=>Object.assign({},ec,{thesisFit:e.target.value}))} className={inp} placeholder="e.g. B2B SaaS, Series A, UK focus"/></div>
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="px-6 pb-5 pt-4 border-t border-gray-800 flex items-center justify-between">
              <div>
                {modalTab==="relationship"&&<button type="button" onClick={()=>setModalTab("profile")} className="text-sm text-gray-400 hover:text-white">← Back</button>}
              </div>
              <div className="flex gap-2">
                <button type="button" onClick={()=>setShowModal(false)} className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm">Cancel</button>
                {modalTab==="profile"
                  ?<button type="button" onClick={()=>setModalTab("relationship")} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium">Next →</button>
                  :<button type="button" onClick={saveContact} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium">Save</button>
                }
              </div>

          </div>
        </div>
      )}

  );
}

// ── SYSTEM HEALTH VIEW ────────────────────────────────────────────────────────
function SystemHealth({gsUrl,gsConnected,gsClientRef,lastSyncRef,syncConflict,gsSaving,tasks,contacts,decisions,activityLog}){
  const[checks,setChecks]=useState({});
  const[running,setRunning]=useState(false);
  const[lastRun,setLastRun]=useState(null);
  const[expandedCheck,setExpandedCheck]=useState(null);

  const STATUS={
    ok:    {icon:"✓", label:"OK",      ring:"ring-green-500/30",  badge:"bg-green-900/60 text-green-300 border border-green-700",  dot:"bg-green-500"},
    warn:  {icon:"⚠", label:"Warning", ring:"ring-yellow-500/30", badge:"bg-yellow-900/60 text-yellow-300 border border-yellow-700",dot:"bg-yellow-400"},
    fail:  {icon:"✕", label:"Failed",  ring:"ring-red-500/30",    badge:"bg-red-900/60 text-red-300 border border-red-700",         dot:"bg-red-500"},
    skip:  {icon:"—", label:"Skipped", ring:"ring-gray-700/30",   badge:"bg-gray-800 text-gray-500 border border-gray-700",         dot:"bg-gray-600"},
    pending:{icon:"…",label:"Running", ring:"ring-indigo-500/30", badge:"bg-indigo-900/60 text-indigo-300 border border-indigo-700",dot:"bg-indigo-400 animate-pulse"},
  };

  function setCheck(id, status, detail, extra){
    setChecks(prev=>Object.assign({},prev,{[id]:{status,detail,extra:extra||null,ts:new Date().toISOString()}}));
  }
  function setPending(id){
    setChecks(prev=>Object.assign({},prev,{[id]:{status:"pending",detail:"Running…",extra:null,ts:null}}));
  }

  async function runAll(){
    setRunning(true);
    setChecks({});

    // ── 1. Apps Script reachability ──────────────────────────────────────────
    setPending("gs_ping");
    if(!gsUrl){
      setCheck("gs_ping","skip","No Apps Script URL configured. Go to Settings → Google Sheets.");
    } else {
      try{
        const start=Date.now();
        const r=await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"ping"})});
        const ms=Date.now()-start;
        if(!r.ok) throw new Error("HTTP "+r.status);
        const j=await r.json();
        if(j.error) throw new Error(j.error);
        setCheck("gs_ping","ok",`Responded in ${ms}ms. Server time: ${j.ts||"unknown"}`,{latencyMs:ms,serverTs:j.ts});
      }catch(e){
        setCheck("gs_ping","fail",`Could not reach Apps Script: ${e.message}. Check the URL and ensure it's deployed as a Web App with "Anyone" access.`);
      }
    }

    // ── 2. Apps Script version / actions ─────────────────────────────────────
    setPending("gs_actions");
    if(!gsUrl){
      setCheck("gs_actions","skip","No URL configured.");
    } else {
      try{
        const r=await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"readMeta"})});
        if(!r.ok) throw new Error("HTTP "+r.status);
        const ct=r.headers.get("content-type")||"";
        if(!ct.includes("json")&&!ct.includes("text/plain")) throw new Error("Apps Script returned HTML instead of JSON — check deployment URL and ensure \"Execute as: Me, Access: Anyone\".");
        const j=await r.json();
        if(j.error&&j.error.startsWith("Unknown action")){
          setCheck("gs_actions","fail","Apps Script is outdated (v3 or earlier). The readMeta, upsertRow locking, and _meta polling actions are missing. Redeploy using the latest LiveSync_AppsScript.gs file.");
        } else if(j.error){
          setCheck("gs_actions","warn",`readMeta returned an error: ${j.error}. Script may be partially updated.`);
        } else {
          const lastChanged=j.lastChanged||"(not set yet)";
          setCheck("gs_actions","ok",`All v4 actions available. _meta lastChanged: ${lastChanged}`,{lastChanged:j.lastChanged});
        }
      }catch(e){
        setCheck("gs_actions","fail",`Action check failed: ${e.message}`);
      }
    }

    // ── 3. Read/write round-trip ──────────────────────────────────────────────
    setPending("gs_roundtrip");
    if(!gsUrl||!gsConnected){
      setCheck("gs_roundtrip","skip",!gsUrl?"No URL configured.":"Not connected — connect first via Settings.");
    } else {
      try{
        const testVal={_livesync_health_check:true,ts:new Date().toISOString()};
        const start=Date.now();
        // Write to _meta (safe, non-destructive)
        const wr=await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"writeMeta",data:JSON.stringify(testVal)})});
        if(!wr.ok) throw new Error("Write HTTP "+wr.status);
        const wct=wr.headers.get("content-type")||"";
        if(!wct.includes("json")&&!wct.includes("text/plain")) throw new Error("Apps Script returned HTML instead of JSON — check deployment URL.");
        const wj=await wr.json();
        if(wj.error) throw new Error("Write failed: "+wj.error);
        // Read it back
        const rr=await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"readMeta"})});
        if(!rr.ok) throw new Error("Read HTTP "+rr.status);
        const rj=await rr.json();
        const ms=Date.now()-start;
        if(rj.error) throw new Error("Read failed: "+rj.error);
        setCheck("gs_roundtrip","ok",`Write + read round-trip completed in ${ms}ms.`,{ms});
      }catch(e){
        setCheck("gs_roundtrip","fail",`Round-trip failed: ${e.message}`);
      }
    }

    // ── 4. Optimistic locking ─────────────────────────────────────────────────
    setPending("gs_locking");
    if(!gsUrl||!gsConnected){
      setCheck("gs_locking","skip","Not connected.");
    } else {
      try{
        // Try an upsert with a very old lastModified — should succeed (no conflict)
        // We use a dummy row on a test that won't touch real data
        // Actually: just confirm the upsertRow action exists and returns ok/conflict shape
        const r=await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({
          action:"upsertRow",sheet:"Tasks",idCol:"ID",idValue:"__healthcheck_nonexistent__",
          rowData:["__healthcheck__"],lastModified:"1970-01-01T00:00:00.000Z"
        })});
        if(!r.ok) throw new Error("HTTP "+r.status);
        const ct=r.headers.get("content-type")||"";
        if(!ct.includes("json")&&!ct.includes("text/plain")) throw new Error("Apps Script returned HTML instead of JSON — check deployment URL and ensure \"Execute as: Me, Access: Anyone\".");
        const j=await r.json();
        if(j.error&&j.error.startsWith("Unknown action")){
          setCheck("gs_locking","fail","upsertRow action not found — script needs redeploying.");
        } else if(j.error&&j.error.startsWith("CONFLICT:")){
          setCheck("gs_locking","ok","Locking logic is active (test returned CONFLICT as expected).");
        } else if(j.ok){
          // It appended a dummy row — clean it up
          await fetch(gsUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"deleteRow",sheet:"Tasks",idCol:"ID",idValue:"__healthcheck__"})});
          setCheck("gs_locking","ok","upsertRow action works. Conflict rejection is active (no existing row to conflict with for this test).");
        } else {
          setCheck("gs_locking","warn",`Unexpected response: ${JSON.stringify(j)}`);
        }
      }catch(e){
        setCheck("gs_locking","fail",`Locking test failed: ${e.message}`);
      }
    }

    // ── 5. _meta polling ─────────────────────────────────────────────────────
    setPending("gs_meta");
    if(!gsConnected){
      setCheck("gs_meta","skip","Not connected.");
    } else {
      const lastSync=lastSyncRef?.current;
      if(!lastSync){
        setCheck("gs_meta","warn","No pull has been recorded yet this session. Connect and pull first.");
      } else {
        const secondsAgo=Math.round((Date.now()-new Date(lastSync).getTime())/1000);
        const nextPollIn=30-(secondsAgo%30);
        if(syncConflict){
          setCheck("gs_meta","warn",`Polling active — conflict banner is currently showing (Sheets is ahead of local state). Pull to resolve.`,{lastSync,secondsAgo,nextPollIn});
        } else {
          setCheck("gs_meta","ok",`Polling active. Last sync: ${secondsAgo}s ago. Next poll in ~${nextPollIn}s.`,{lastSync,secondsAgo,nextPollIn});
        }
      }
    }

    // ── 6. Anthropic API key ──────────────────────────────────────────────────
    setPending("anthropic_key");
    const apiKey=window.ANTHROPIC_API_KEY||"";
    if(!apiKey){
      setCheck("anthropic_key","warn","No Anthropic API key set. AI features (Meeting Agenda) won't work. Add your key in Settings → Google Sheets.");
    } else if(!apiKey.startsWith("sk-ant-")){
      setCheck("anthropic_key","warn","Key is set but doesn't look like a valid Anthropic key (should start with sk-ant-).");
    } else {
      setCheck("anthropic_key","ok",`Key is set (${apiKey.slice(0,12)}…). Format looks valid.`);
    }

    // ── 7. Anthropic API reachability ─────────────────────────────────────────
    setPending("anthropic_reach");
    if(!apiKey){
      setCheck("anthropic_reach","skip","No API key — skipping reachability check.");
    } else {
      try{
        const start=Date.now();
        const r=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:"ping"}]})
        });
        const ms=Date.now()-start;
        if(r.status===401){
          setCheck("anthropic_reach","fail","API key rejected (401 Unauthorized). Check the key is correct and active.");
        } else if(r.status===200||r.status===400){
          // 400 can mean bad request body but key was accepted
          setCheck("anthropic_reach","ok",`Anthropic API reachable in ${ms}ms.`,{ms,status:r.status});
        } else {
          setCheck("anthropic_reach","warn",`Unexpected HTTP ${r.status} from Anthropic API.`,{ms,status:r.status});
        }
      }catch(e){
        setCheck("anthropic_reach","fail",`Could not reach Anthropic API: ${e.message}. Check your internet connection or CORS settings.`);
      }
    }

    // ── 8. Local data integrity ───────────────────────────────────────────────
    setPending("data_integrity");
    const issues=[];
    // Tasks
    const taskIds=new Set();
    tasks.forEach(t=>{
      if(!t.id) issues.push(`Task missing ID: "${t.name}"`);
      else if(taskIds.has(t.id)) issues.push(`Duplicate task ID: ${t.id} ("${t.name}")`);
      else taskIds.add(t.id);
      if(!t.name) issues.push(`Task ${t.id} has no name`);
    });
    // Contacts
    const contactIds=new Set();
    contacts.forEach(c=>{
      if(!c.id) issues.push(`Contact missing ID: "${c.name}"`);
      else if(contactIds.has(c.id)) issues.push(`Duplicate contact ID: ${c.id}`);
      else contactIds.add(c.id);
    });
    // Decisions
    const decIds=new Set();
    decisions.forEach(d=>{
      if(!d.id) issues.push(`Decision missing ID`);
      else if(decIds.has(d.id)) issues.push(`Duplicate decision ID: ${d.id}`);
      else decIds.add(d.id);
    });
    if(issues.length===0){
      setCheck("data_integrity","ok",`${tasks.length} tasks, ${contacts.length} contacts, ${decisions.length} decisions — no duplicates or missing IDs found.`,{tasks:tasks.length,contacts:contacts.length,decisions:decisions.length});
    } else {
      setCheck("data_integrity","warn",`${issues.length} issue${issues.length>1?"s":""} found:\n${issues.slice(0,5).join("\n")}${issues.length>5?`\n…and ${issues.length-5} more`:""}`,{issues});
    }

    // ── 9. localStorage ───────────────────────────────────────────────────────
    setPending("localstorage");
    try{
      const testKey="_ls_health_"+Date.now();
      localStorage.setItem(testKey,"ok");
      const v=localStorage.getItem(testKey);
      localStorage.removeItem(testKey);
      const gsUrlSaved=localStorage.getItem("gs_url")||"(not saved)";
      const defaultsSaved=localStorage.getItem("task_defaults")||"(not saved)";
      if(v==="ok"){
        setCheck("localstorage","ok",`localStorage is working. Saved GS URL: ${gsUrlSaved.slice(0,40)}${gsUrlSaved.length>40?"…":""}`,{gsUrl:gsUrlSaved,defaults:defaultsSaved});
      } else {
        setCheck("localstorage","warn","localStorage read/write mismatch.");
      }
    }catch(e){
      setCheck("localstorage","fail",`localStorage not available: ${e.message}. Settings won't persist between sessions.`);
    }

    setLastRun(new Date());
    setRunning(false);
  }

  const CHECKS=[
    {id:"gs_ping",       label:"Apps Script reachability", group:"Google Sheets"},
    {id:"gs_actions",    label:"Apps Script version (v4 actions)", group:"Google Sheets"},
    {id:"gs_roundtrip",  label:"Read / write round-trip",  group:"Google Sheets"},
    {id:"gs_locking",    label:"Optimistic locking",        group:"Google Sheets"},
    {id:"gs_meta",       label:"_meta polling (30s sync)",  group:"Google Sheets"},
    {id:"anthropic_key", label:"Anthropic API key",         group:"AI Features"},
    {id:"anthropic_reach",label:"Anthropic API reachability",group:"AI Features"},
    {id:"data_integrity",label:"Local data integrity",      group:"Local State"},
    {id:"localstorage",  label:"localStorage persistence",  group:"Local State"},
  ];

  const groups=[...new Set(CHECKS.map(c=>c.group))];

  const overallStatus=(()=>{
    const vals=Object.values(checks);
    if(vals.length===0) return null;
    if(vals.some(v=>v.status==="pending")) return "pending";
    if(vals.some(v=>v.status==="fail")) return "fail";
    if(vals.some(v=>v.status==="warn")) return "warn";
    return "ok";
  })();

  const SUMMARY_MSG={
    ok:"All systems operational.",
    warn:"Some warnings detected — review below.",
    fail:"One or more checks failed — action required.",
    pending:"Running diagnostics…",
  };

  return(
    <div className="max-w-3xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h2 className="text-2xl font-bold">System Health</h2>
          <p className="text-gray-500 text-sm mt-0.5">Diagnostics for all LiveSync connections and data</p>
        </div>
        <button
          onClick={runAll}
          disabled={running}
          className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"
        >
          {running?<><span className="animate-spin inline-block text-base">⟳</span> Running…</>:<><span>▶</span> Run diagnostics</>}
        </button>
      </div>

      {/* Overall status banner */}
      {overallStatus&&<div className={"rounded-xl p-4 mb-6 flex items-center gap-3 border "+(
        overallStatus==="ok"?"bg-green-900/30 border-green-700":
        overallStatus==="fail"?"bg-red-900/30 border-red-700":
        overallStatus==="warn"?"bg-yellow-900/30 border-yellow-700":
        "bg-indigo-900/30 border-indigo-700"
      )}>
        <div className={"w-3 h-3 rounded-full flex-shrink-0 "+(STATUS[overallStatus]?.dot||"bg-gray-500")+(overallStatus==="pending"?" animate-pulse":"")}/>
        <div>
          <span className="font-semibold text-white text-sm">{SUMMARY_MSG[overallStatus]}</span>
          {lastRun&&overallStatus!=="pending"&&<span className="text-gray-500 text-xs ml-3">Last run {lastRun.toLocaleTimeString("en-GB")}</span>}
        </div>
      </div>}

      {/* Quick-glance status bar — shown before running */}
      {!overallStatus&&<div className="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6 text-center">
        <p className="text-gray-400 text-sm mb-1">Click <span className="text-white font-medium">Run diagnostics</span> to check all systems.</p>
        <p className="text-gray-600 text-xs">Tests Apps Script connectivity, locking, polling, AI API, and local data integrity.</p>
      </div>}

      {/* Checks grouped */}
      {groups.map(group=>{
        const groupChecks=CHECKS.filter(ch=>ch.group===group);
        const groupResults=groupChecks.map(ch=>checks[ch.id]).filter(Boolean);
        const groupStatus=groupResults.length===0?null:
          groupResults.some(r=>r.status==="pending")?"pending":
          groupResults.some(r=>r.status==="fail")?"fail":
          groupResults.some(r=>r.status==="warn")?"warn":
          groupResults.every(r=>r.status==="ok"||r.status==="skip")?"ok":null;

        return(
          <div key={group} className="mb-5">
            <div className="flex items-center gap-2 mb-2">
              <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{group}</h3>
              {groupStatus&&<div className={"w-2 h-2 rounded-full "+(STATUS[groupStatus]?.dot||"bg-gray-600")+(groupStatus==="pending"?" animate-pulse":"")}/>}
            </div>
            <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden divide-y divide-gray-800">
              {groupChecks.map(ch=>{
                const result=checks[ch.id];
                const s=result?STATUS[result.status]:null;
                const isExpanded=expandedCheck===ch.id;
                return(
                  <div key={ch.id}>
                    <div
                      className={"flex items-center gap-3 px-4 py-3 "+(result&&result.detail?"cursor-pointer hover:bg-gray-800/50":"")}
                      onClick={()=>result&&result.detail&&setExpandedCheck(isExpanded?null:ch.id)}
                    >
                      {/* Status dot / spinner */}
                      <div className="flex-shrink-0 w-5 h-5 flex items-center justify-center">
                        {!result&&<div className="w-2 h-2 rounded-full bg-gray-700"/>}
                        {result&&result.status==="pending"&&<div className="w-3 h-3 rounded-full bg-indigo-400 animate-pulse"/>}
                        {result&&result.status!=="pending"&&<span className={"text-sm font-bold "+(
                          result.status==="ok"?"text-green-400":
                          result.status==="fail"?"text-red-400":
                          result.status==="warn"?"text-yellow-400":
                          "text-gray-600"
                        )}>{s?.icon}</span>}
                      </div>

                      {/* Label */}
                      <span className="flex-1 text-sm text-gray-200">{ch.label}</span>

                      {/* Badge */}
                      {result&&result.status!=="pending"&&
                        <span className={"text-xs px-2 py-0.5 rounded-full font-medium "+s?.badge}>{s?.label}</span>}
                      {result&&result.status==="pending"&&
                        <span className={"text-xs px-2 py-0.5 rounded-full font-medium "+STATUS.pending.badge}>Running</span>}
                      {!result&&<span className="text-xs text-gray-700">—</span>}

                      {/* Expand chevron */}
                      {result&&result.detail&&<span className="text-gray-600 text-xs ml-1">{isExpanded?"▲":"▼"}</span>}
                    </div>

                    {/* Expanded detail */}
                    {isExpanded&&result&&<div className="px-4 pb-4 pt-1 bg-gray-950/60">
                      <p className="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap">{result.detail}</p>
                      {result.extra&&<div className="mt-2 bg-gray-900 rounded-lg p-3">
                        <pre className="text-xs text-gray-500 overflow-x-auto">{JSON.stringify(result.extra,null,2)}</pre>
                      </div>}
                      {result.ts&&<p className="text-xs text-gray-700 mt-2">Checked at {new Date(result.ts).toLocaleTimeString("en-GB")}</p>}
                    </div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Live indicators footer */}
      {gsConnected&&<div className="mt-4 bg-gray-900 border border-gray-800 rounded-xl p-4">
        <p className="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-3">Live indicators</p>
        <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
          {[
            {label:"Connection",val:gsConnected?"Connected":"Disconnected",ok:gsConnected},
            {label:"Sync state",val:gsSaving?"Saving…":syncConflict?"Out of sync":"Synced",ok:!syncConflict&&!gsSaving},
            {label:"Last pull",val:lastSyncRef?.current?new Date(lastSyncRef.current).toLocaleTimeString("en-GB"):"Never",ok:!!lastSyncRef?.current},
            {label:"Activity log",val:activityLog.length+" entries",ok:true},
          ].map(item=>(
            <div key={item.label} className="bg-gray-800/60 rounded-lg p-3">
              <div className="flex items-center gap-1.5 mb-1">
                <div className={"w-2 h-2 rounded-full flex-shrink-0 "+(item.ok?"bg-green-500":"bg-yellow-400")}/>
                <span className="text-xs text-gray-500">{item.label}</span>
              </div>
              <span className="text-sm font-medium text-gray-200">{item.val}</span>
            </div>
          ))}
        </div>
      </div>}

      {/* ── LIVESYNC Footer Bar ── */}
      <div className="ls-footer">
        <div className="ls-logo">
          <span style="color:#e52626">·</span>
          <span style={{letterSpacing:"0.18em",fontWeight:700}}>LIVESYNC</span>
        </div>
        <span style={{opacity:0.6,fontSize:"0.65rem"}}>Project Management System</span>
      </div>
    </div>
  );
}


// ── Simple inline test harness (URL ?test=1) ─────────────────────────────
function runInlineTests(){
  const tests=[];
  function t(name,fn){tests.push({name,fn});}
  function eq(a,b,msg){if(JSON.stringify(a)!==JSON.stringify(b))throw new Error((msg||"eq")+": expected "+JSON.stringify(b)+" got "+JSON.stringify(a));}
  function truthy(v,msg){if(!v)throw new Error((msg||"truthy")+": got "+v);}

  t("parseDate handles valid date",()=>{const d=parseDate("2026-05-08");truthy(d);eq(d.getDate(),8);});
  t("parseDate handles empty",()=>{eq(parseDate(""),null);eq(parseDate(null),null);});
  t("fmtDate roundtrips",()=>{const d=new Date(2026,4,8);eq(fmtDate(d),"2026-05-08");});
  t("getNextThursday from Wed",()=>{const wed=new Date(2026,4,6);const thu=getNextThursday(wed);eq(thu.getDay(),4);eq(thu.getDate(),7);});
  t("getNextThursday from Thu returns next week",()=>{const thu=new Date(2026,4,7);const next=getNextThursday(thu);eq(next.getDay(),4);eq(next.getDate(),14);});
  t("diffDays positive",()=>{const a=new Date(2026,4,1);const b=new Date(2026,4,10);eq(diffDays(a,b),9);});
  t("addDays adds correctly",()=>{const a=new Date(2026,4,1);const b=addDays(a,5);eq(b.getDate(),6);});
  t("ACTIVE_STATUSES includes core statuses",()=>{truthy(ACTIVE_STATUSES.includes("Ongoing"));truthy(ACTIVE_STATUSES.includes("Blocked"));truthy(ACTIVE_STATUSES.includes("Not Started"));});
  t("isActive returns true for Blocked",()=>{eq(isActive({status:"Blocked"}),true);});
  t("isActive returns false for Complete",()=>{eq(isActive({status:"Complete"}),false);});
  t("uid is unique",()=>{const a=uid("x"),b=uid("x");truthy(a!==b);});
  t("PRIORITY_STYLE has all priorities",()=>{PRIORITIES.forEach(p=>truthy(PRIORITY_STYLE[p],"missing "+p));});

  const results=[];
  tests.forEach(({name,fn})=>{
    try{fn();results.push({name,pass:true});}
    catch(e){results.push({name,pass:false,error:e.message});}
  });
  const passed=results.filter(r=>r.pass).length;
  const total=results.length;
  // Render a corner overlay
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;bottom:24px;left:24px;background:#0f172a;color:#fff;padding:14px 18px;border-radius:10px;font-family:monospace;font-size:13px;z-index:99999;max-width:420px;border:2px solid "+(passed===total?"#16a34a":"#dc2626")+";box-shadow:0 8px 32px rgba(0,0,0,0.5)";
  overlay.innerHTML="<div style=\"font-weight:bold;margin-bottom:8px;font-size:14px\">Tests: "+passed+" / "+total+" passed</div>"+results.map(r=>"<div style=\"color:"+(r.pass?"#4ade80":"#f87171")+"\">"+(r.pass?"✓":"✗")+" "+r.name+(r.error?"<br><span style=\"color:#94a3b8;font-size:11px;margin-left:14px\">"+r.error+"</span>":"")+"</div>").join("")+"<div style=\"margin-top:8px;font-size:11px;color:#64748b;cursor:pointer\" onclick=\"this.parentNode.remove()\">click to dismiss</div>";
  document.body.appendChild(overlay);
  console.log("[tests]",passed+"/"+total,results);
}
if(typeof window!=="undefined"&&window.location.search.includes("test=1")){
  setTimeout(runInlineTests,500);
}

  React.createElement(ErrorBoundary, null,
    React.createElement(ToastProvider, null,
      React.createElement(ConfirmProvider, null,
        React.createElement(App)
      )
    )
  )
);

</script>
<script>
(function(){
  function run(){
    try{
      var src=document.getElementById('app-jsx').textContent;
      // Cache compiled JS in localStorage — first load slow, subsequent loads instant.
      // Cache key includes a hash of the source so any code change invalidates it.
      var srcHash = 0;
      for(var i=0;i<src.length;i++){srcHash=((srcHash<<5)-srcHash)+src.charCodeAt(i);srcHash|=0;}
      var cacheKey = 'ls_babel_cache_v1_'+srcHash;
      var cached = null;
      try{cached = localStorage.getItem(cacheKey);}catch(e){}
      var result;
      if(cached){
        result = {code: cached};
      } else {
        result = Babel.transform(src,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'});
        // Clear any stale cache entries
        try{
          for(var k in localStorage){
            if(k.indexOf('ls_babel_cache_v1_')===0 && k!==cacheKey) localStorage.removeItem(k);
          }
          localStorage.setItem(cacheKey, result.code);
        }catch(e){/* quota or private mode — non-fatal */}
      }
      (new Function(result.code))();
    }catch(e){
      document.getElementById('root').innerHTML=
        '<div style="color:#ef4444;padding:2rem;font-family:monospace;background:#030712;min-height:100vh;white-space:pre-wrap">'+
        '<b style="font-size:1.1rem">App Error</b>\n\n'+(e.stack||e.message||String(e))+'</div>';
    }
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',run);}else{run();}
})();
</script>
