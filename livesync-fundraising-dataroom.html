<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVESYNC — Fundraising Dataroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0036db; --white: #ffffff; --black: #252525; --red: #e52626;
      --panel: #f4f6fb; --border: #d4dae8; --text-muted: rgba(37,37,37,0.45);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Raleway', sans-serif; font-weight: 400; color: var(--black); background: var(--white); min-height: 100vh; }

    .top-bar { background: var(--blue); color: var(--white); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(24px,5vw,64px); height: 52px; position: sticky; top: 0; z-index: 100; }
    .top-bar-left { display: flex; align-items: center; gap: 14px; }
    .livesync-wordmark svg { height: 19px; display: block; }
    .top-bar-label { font-size: 0.68rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; border-left: 1px solid rgba(255,255,255,0.25); padding-left: 14px; }
    .top-bar-right { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.55; }

    .page-wrap { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 52px); }
    .sidebar { border-right: 1px solid var(--border); padding: 36px 0; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
    .sidebar-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); padding: 0 24px; margin-bottom: 14px; }
    .nav-item { display: block; padding: 8px 24px; font-size: 0.78rem; color: var(--black); text-decoration: none; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s ease; line-height: 1.4; }
    .nav-item:hover { background: var(--panel); color: var(--blue); border-left-color: var(--blue); }
    .nav-item.active { color: var(--blue); border-left-color: var(--blue); font-weight: 700; background: var(--panel); }
    .nav-emoji { margin-right: 6px; }

    .main { padding: clamp(32px,4vw,56px) clamp(32px,5vw,72px); max-width: 920px; }
    .page-header { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-size: clamp(1.6rem,3.5vw,2.2rem); font-weight: 700; line-height: 1.15; margin-bottom: 10px; }
    .page-header p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; max-width: 60ch; }
    .header-meta { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .meta-chip { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); background: var(--panel); border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; }

    .banner { display: flex; align-items: center; justify-content: space-between; gap: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 40px; }
    .banner .b-text { display: flex; align-items: center; gap: 14px; }
    .banner .b-icon { width: 38px; height: 38px; border-radius: 50%; background: rgba(0,54,219,0.08); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .banner .b-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 2px; }
    .banner .b-sub { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }
    .b-btn-locked { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; white-space: nowrap; cursor: not-allowed; display: inline-flex; align-items: center; gap: 6px; }
    .b-btn-active { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--white); background: var(--blue); border: 1px solid var(--blue); border-radius: 8px; padding: 9px 14px; white-space: nowrap; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: opacity 0.15s ease; }
    .b-btn-active:hover { opacity: 0.85; }
    .b-back { font-size: 0.75rem; font-weight: 700; color: var(--blue); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .b-back:hover { text-decoration: underline; }

    .section-group { margin-bottom: 48px; scroll-margin-top: 72px; }
    .section-header { display: flex; align-items: baseline; gap: 10px; }
    .section-title { font-size: clamp(1rem,2vw,1.1rem); font-weight: 700; }
    .section-number { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; }
    .section-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.55; margin-top: 6px; max-width: 60ch; }
    .section-rule { height: 1px; background: var(--border); margin: 14px 0 0 0; }

    .item-row { display: grid; grid-template-columns: 48px 1fr auto auto; align-items: start; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-num-col { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); padding-top: 2px; }
    .item-name { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
    .item-description { font-size: 0.8rem; color: var(--text-muted); line-height: 1.55; max-width: 55ch; }
    .item-description.na { font-style: italic; }
    .item-links { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .item-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; color: var(--blue); background: rgba(0,54,219,0.06); border: 1px solid rgba(0,54,219,0.2); border-radius: 8px; padding: 7px 12px; text-decoration: none; white-space: nowrap; transition: all 0.15s ease; }
    .item-btn:hover { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .item-date { font-family: Verdana, sans-serif; font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; padding-top: 3px; min-width: 72px; text-align: right; }

    .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; color: var(--text-muted); }
    .state-box .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-box p { font-size: 0.85rem; line-height: 1.6; }
    .state-box .hint { margin-top: 18px; font-size: 0.78rem; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; text-align: left; max-width: 480px; color: var(--black); line-height: 1.7; }
    .state-box .hint code { font-family: monospace; font-size: 0.74rem; background: rgba(0,54,219,0.06); padding: 2px 6px; border-radius: 4px; color: var(--blue); }

    .bottom-bar { background: var(--blue); color: var(--white); display: flex; align-items: center; justify-content: space-between; padding: 14px clamp(24px,5vw,64px); margin-top: 40px; }
    .bottom-bar .livesync-logo svg { height: 15px; display: block; }
    .bottom-bar .right { font-weight: 400; opacity: 0.5; font-size: 0.65rem; letter-spacing: 0.06em; }

    @media (max-width: 760px) {
      .page-wrap { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .item-row { grid-template-columns: 40px 1fr; }
      .item-links { align-items: flex-start; grid-column: 2; }
      .item-date { grid-column: 2; text-align: left; }
      .banner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

  <script>
    // ════════════════════════════════════════════════════════════════
    //  CONFIG — the only block you ever need to touch
    // ════════════════════════════════════════════════════════════════
    const CONFIG = {
      // Paste the published CSV link for the FUNDRAISING tab here:
      csvUrl: 'PASTE_FUNDRAISING_CSV_URL_HERE',

      // The "Full pack" banner. Set unlocked:true to turn it into a live
      // link; false shows the locked "Request access" state.
      fullAccessBanner: {
        title: 'Full Due Diligence Pack',
        sub: 'Additional documents available at the next stage.',
        unlocked: false,
        url: 'livesync-full-diligence-pack.html'
      }
    };

    // ── Header aliases: maps your sheet's column titles to internal keys ──
    const HEADER_MAP = {
      'itemno':'num','itemnumber':'num','no':'num','number':'num','ref':'num','section':'num',
      'item':'name','title':'name',
      'description':'desc','desc':'desc','notes':'desc',
      'documentname':'docName','docname':'docName','document':'docName','documents':'docName','filename':'docName',
      'link':'link','links':'link','url':'link','urls':'link',
      'lastupdated':'date','updated':'date','date':'date',
    };
    const NA_PHRASES = ['not applicable at this point in time','awaiting pilot','n/a','not applicable','tbc','tbd'];

    function normHeader(h){ return (h||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

    // CSV parser handling quoted fields with commas / newlines
    function parseCSV(text){
      const rows=[]; let row=[], field='', q=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(q){ if(c=='"'&&n=='"'){field+='"';i++;} else if(c=='"'){q=false;} else field+=c; }
        else { if(c=='"')q=true; else if(c==','){row.push(field);field='';}
               else if(c=='\n'||(c=='\r'&&n=='\n')){ if(c=='\r')i++; row.push(field); rows.push(row); row=[]; field=''; }
               else field+=c; }
      }
      if(field||row.length){ row.push(field); rows.push(row); }
      return rows.map(r=>r.map(c=>c.trim()));
    }

    // Find the header row (first row with >=2 recognised headers) and map columns
    function mapColumns(rows){
      for(let i=0;i<Math.min(rows.length,10);i++){
        const map={}; let hits=0;
        rows[i].forEach((cell,idx)=>{ const k=HEADER_MAP[normHeader(cell)]; if(k && !(k in map)){ map[k]=idx; hits++; } });
        if(hits>=2) return { headerIndex:i, map };
      }
      // Fallback: assume positional order
      return { headerIndex:0, map:{num:0,name:1,desc:2,docName:3,link:4,date:5} };
    }

    // A row is a section header only if its number is "N" or "N.0" (e.g. 1, 1.0, 10.0)
    function isSectionHeader(num){ return /^\d+(\.0+)?$/.test((num||'').trim()); }
    // The major group number for any row: "5.1" -> "5", "5.0" -> "5", "5" -> "5"
    function majorOf(num){ const m=(num||'').trim().match(/^(\d+)/); return m?m[1]:null; }
    function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function emoji(s){ const m=s.match(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u); return m?m[0]:''; }
    function stripEmoji(s){ return s.replace(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/gu,'').trim(); }

    // Pair document names with links by position (both pipe-separated)
    function buildLinks(docNames, links){
      const names=(docNames||'').split('|').map(s=>s.trim()).filter(Boolean);
      const urls=(links||'').split('|').map(s=>s.trim()).filter(Boolean);
      if(!urls.length) return [];
      return urls.map((u,i)=>({ url:u, label:names[i]||'View' }));
    }

    function renderBanner(){
      const slot=document.getElementById('banner-slot');
      if(CONFIG.fullAccessBanner){
        const b=CONFIG.fullAccessBanner;
        const btn = b.unlocked
          ? `<a class="b-btn-active" href="${esc(b.url)}">Open full pack
              <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>`
          : `<span class="b-btn-locked">🔒 Request access from the LIVESYNC team</span>`;
        slot.innerHTML = `
          <div class="banner">
            <div class="b-text">
              <div class="b-icon">${b.unlocked?'📂':'🔒'}</div>
              <div>
                <div class="b-title">${esc(b.title)}</div>
                <div class="b-sub">${esc(b.sub)}</div>
              </div>
            </div>
            ${btn}
          </div>`;
      } else if(CONFIG.backLink){
        slot.innerHTML = `<div style="margin-bottom:32px;"><a class="b-back" href="${esc(CONFIG.backLink.url)}">← ${esc(CONFIG.backLink.label)}</a></div>`;
      }
    }

    function render(rows){
      const { headerIndex, map } = mapColumns(rows);
      const get=(r,k)=> (map[k]!=null ? (r[map[k]]||'') : '');

      const data = rows.slice(headerIndex+1).map(r=>({
        num:get(r,'num'), name:get(r,'name'), desc:get(r,'desc'),
        docName:get(r,'docName'), link:get(r,'link'), date:get(r,'date'),
      })).filter(it=>{
        const id=(it.num+it.name).trim();
        if(!id) return false;
        if(/^#REF/.test(it.num)||/^#REF/.test(it.name)) return false;
        if(/^\.*$/.test(it.num+it.name)) return false;
        return true;
      });

      // Group by major number (the "5" in "5.1"). A header row (N.0) supplies
      // the group's title/desc/emoji; if missing, the group still forms.
      const sections=[]; const byMajor={}; let orphan=null;
      function ensureGroup(major){
        if(!byMajor[major]){ const g={ major, num:major, name:'Section '+major, desc:'', items:[] }; byMajor[major]=g; sections.push(g); }
        return byMajor[major];
      }
      data.forEach(it=>{
        const major=majorOf(it.num);
        if(major===null){
          // No usable number — keep with the current group, else a leading bucket
          if(sections.length){ sections[sections.length-1].items.push(it); }
          else { if(!orphan){ orphan={ major:'', num:'', name:'Overview', desc:'', items:[] }; sections.unshift(orphan); } orphan.items.push(it); }
          return;
        }
        const g=ensureGroup(major);
        if(isSectionHeader(it.num)){ g.num=it.num; g.name=it.name||g.name; g.desc=it.desc||g.desc; }
        else { g.items.push(it); }
      });

      document.getElementById('item-count').textContent =
        sections.reduce((a,s)=>a+s.items.length,0)+' items';
      document.getElementById('last-refresh').textContent =
        'Live · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

      document.getElementById('nav-links').innerHTML = sections.map(s=>{
        const id='sec-'+(s.num||s.name).replace(/[^a-z0-9]/gi,'-');
        return `<a class="nav-item" href="#${id}"><span class="nav-emoji">${emoji(s.name)}</span>${esc(stripEmoji(s.name))}</a>`;
      }).join('');

      document.getElementById('content').innerHTML = sections.map(s=>{
        const id='sec-'+(s.num||s.name).replace(/[^a-z0-9]/gi,'-');
        const items=s.items.map(it=>{
          const links=buildLinks(it.docName,it.link);
          const isNA=it.desc && NA_PHRASES.includes(it.desc.trim().toLowerCase().replace(/\.$/,''));
          const linksHTML=links.length
            ? `<div class="item-links">`+links.map(l=>`<a class="item-btn" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>`).join('')+`</div>`
            : `<div class="item-links"></div>`;
          const descHTML=it.desc?`<div class="item-description${isNA?' na':''}">${esc(it.desc)}</div>`:'';
          return `<div class="item-row">
              <div class="item-num-col">${esc(it.num)}</div>
              <div><div class="item-name">${esc(it.name)}</div>${descHTML}</div>
              ${linksHTML}
              <div class="item-date">${esc(it.date)}</div>
            </div>`;
        }).join('');
        const secDesc=s.desc?`<div class="section-desc">${esc(s.desc)}</div>`:'';
        return `<div class="section-group" id="${id}">
            <div class="section-header"><span class="section-title">${emoji(s.name)} ${esc(stripEmoji(s.name))}</span><span class="section-number">${esc(s.num)}</span></div>
            ${secDesc}<div class="section-rule"></div>${items}
          </div>`;
      }).join('');
    }

    async function loadData(){
      renderBanner();
      if(!CONFIG.csvUrl || CONFIG.csvUrl.startsWith('PASTE_')){
        document.getElementById('content').innerHTML = `
          <div class="state-box">
            <p>Not connected to a sheet yet.</p>
            <div class="hint">Open this file and set <code>csvUrl</code> in the CONFIG block to your published CSV link for this tab.</div>
          </div>`;
        document.getElementById('last-refresh').textContent='Not connected';
        return;
      }
      try{
        const res=await fetch(CONFIG.csvUrl);
        if(!res.ok) throw new Error('HTTP '+res.status);
        render(parseCSV(await res.text()));
      }catch(err){
        document.getElementById('content').innerHTML = `
          <div class="state-box">
            <p>Couldn't load data from the sheet.<br><strong>Error:</strong> ${esc(err.message)}</p>
            <div class="hint">Check the tab is published to the web as CSV and the link is correct.</div>
          </div>`;
        document.getElementById('last-refresh').textContent='Error';
      }
    }
    loadData();
  </script>
